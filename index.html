<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>리스트업 - 모바일 게임 리세계 직거래 플랫폼</title>
  <meta name="description" content="원신, 블루아카이브, 니케, 쿠키런킹덤 리세계 계정 직거래. 안전하고 빠른 리세계 계정 거래 플랫폼 리스트업.">
  <meta property="og:title" content="리스트업 - 리세계 직거래 플랫폼">
  <meta property="og:description" content="모바일 게임 리세계 계정 직거래를 한 곳에서.">
  <meta property="og:type" content="website">
  <link rel="stylesheet" href="/css/style.css">
</head>
<body>

<div id="navbar"></div>

<!-- 히어로 -->
<section class="hero">
  <div class="hero-inner">
    <div class="hero-text">
      <h1>리세계 직거래,<br>지금 시작하세요.</h1>
      <p>원신 · 블루아카이브 · 니케 · 쿠키런킹덤 계정 직거래 플랫폼</p>
      <div class="hero-stats">
        <div class="hero-stat">
          <span>전체 계정</span>
          <strong id="stat-listings">-</strong>
        </div>
        <div class="hero-stat">
          <span>지원 게임</span>
          <strong>4개</strong>
        </div>
        <div class="hero-stat">
          <span>오늘 등록</span>
          <strong id="stat-today">-</strong>
        </div>
      </div>
    </div>
    <div class="hero-games">
      <a href="/genshin/" class="hero-game-card genshin" style="grid-row: 1 / 2;">
        <span class="emoji">🌙</span>
        <span class="name">원신</span>
      </a>
      <a href="/bluearchive/" class="hero-game-card blue">
        <span class="emoji">📘</span>
        <span class="name">블루아카이브</span>
      </a>
      <a href="/nikke/" class="hero-game-card nikke">
        <span class="emoji">⚡</span>
        <span class="name">니케</span>
      </a>
      <a href="/cookierunkingdom/" class="hero-game-card cookie">
        <span class="emoji">🍪</span>
        <span class="name">쿠키런킹덤</span>
      </a>
    </div>
  </div>
</section>

<!-- 탭 바 -->
<div class="tab-bar">
  <div class="tab-bar-inner">
    <span class="tab-section-title">모든 계정</span>
    <div class="tab-divider"></div>
    <div class="tab-list">
      <a href="/" class="tab-item active">전체</a>
      <a href="/genshin/" class="tab-item">🌙 원신</a>
      <a href="/bluearchive/" class="tab-item">📘 블루아카이브</a>
      <a href="/nikke/" class="tab-item">⚡ 니케</a>
      <a href="/cookierunkingdom/" class="tab-item">🍪 쿠키런킹덤</a>
    </div>
    <div class="tab-sort">
      <button class="sort-btn active" id="sort-latest" onclick="setSort('latest')">최신순</button>
      <span class="sort-divider">|</span>
      <button class="sort-btn" id="sort-price" onclick="setSort('price')">가격순</button>
    </div>
  </div>
</div>

<div class="page-wrapper">
  <div id="listings-container">
    <div class="loading">불러오는 중...</div>
  </div>
  <a href="#" class="btn-more" id="more-btn" style="display:none;">계정 더보기</a>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="/js/config.js"></script>
<script src="/js/listings.js"></script>
<script>
  document.getElementById('navbar').innerHTML = renderNavbar('home')

  async function loadStats() {
    const { count } = await db.from('Listing').select('*', { count: 'exact', head: true }).eq('status', 'active')
    document.getElementById('stat-listings').textContent = (count ?? 0) + '개'

    const today = new Date(); today.setHours(0,0,0,0)
    const { count: todayCount } = await db.from('Listing')
      .select('*', { count: 'exact', head: true })
      .eq('status', 'active')
      .gte('createdAt', today.toISOString())
    document.getElementById('stat-today').textContent = '+' + (todayCount ?? 0) + '개'
  }

  let currentSort = 'latest'
  function setSort(sort) {
    currentSort = sort
    document.getElementById('sort-latest').classList.toggle('active', sort === 'latest')
    document.getElementById('sort-price').classList.toggle('active', sort === 'price')
    loadListings({ container: 'listings-container', limit: 9, sort })
  }

  loadListings({ container: 'listings-container', limit: 9 })
  loadStats()
  loadAndRenderGameUI(null)
</script>
</body>
</html>
