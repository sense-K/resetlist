<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>리세 리스트 - 모바일 게임 리세계 직거래 플랫폼 | resetlist</title>
  <meta name="description" content="원하는 리세계를 검색해보세요. 다양한 모바일 게임의 리세계 판매계정을 한 곳에서 확인하고 안전하게 거래하세요.">
  <meta name="keywords" content="리세계, 리세계 직거래, 리세계 판매, 판매계정, 리세 리스트, resetlist">
  <link rel="canonical" href="https://resetlist.kr/">
  <meta property="og:type" content="website">
  <meta property="og:url" content="https://resetlist.kr/">
  <meta property="og:title" content="리세 리스트 - 모바일 게임 리세계 직거래 플랫폼">
  <meta property="og:description" content="원하는 리세계를 검색해보세요. 다양한 모바일 게임의 리세계 판매계정을 한 곳에서 확인하고 안전하게 거래하세요.">
  <meta property="og:site_name" content="리세 리스트">
  <meta name="twitter:card" content="summary_large_image">
  <meta name="twitter:title" content="리세 리스트 - 모바일 게임 리세계 직거래 플랫폼">
  <meta name="twitter:description" content="원하는 리세계를 검색해보세요. 다양한 모바일 게임의 리세계 판매계정을 한 곳에서 확인하고 안전하게 거래하세요.">
  <script type="application/ld+json">
  {
    "@context": "https://schema.org",
    "@type": "WebSite",
    "name": "리세 리스트",
    "alternateName": "resetlist",
    "url": "https://resetlist.kr",
    "description": "다양한 모바일 게임의 리세계 판매계정을 한 곳에서 확인하고 안전하게 거래하는 직거래 플랫폼",
    "potentialAction": {
      "@type": "SearchAction",
      "target": {
        "@type": "EntryPoint",
        "urlTemplate": "https://resetlist.kr/?q={search_term_string}"
      },
      "query-input": "required name=search_term_string"
    }
  }
  </script>
  <link rel="stylesheet" href="/css/style.css">
</head>
<body>

<div id="navbar"></div>

<!-- 히어로 -->
<section class="hero">
  <div class="hero-inner">
    <div class="hero-text">
      <h1>리세계 직거래,<br>지금 시작하세요.</h1>
    </div>
    <div class="hero-collage" id="hero-collage"></div>
  </div>
</section>

<!-- 게임 선택 카드 -->
<section class="game-select-section">
  <div class="game-select-inner">
    <div class="game-select-header">
      <span class="game-select-title">거래소 바로가기</span>
    </div>
    <div class="game-cards-grid" id="game-cards-section"></div>
  </div>
</section>

<!-- 최신 판매글 -->
<div class="page-wrapper">
  <div class="search-bar-wrap">
    <input type="text" id="search-input" class="search-bar-input" placeholder="캐릭터명, 설명으로 검색..." oninput="handleSearch(this.value)">
    <span class="search-bar-icon">🔍</span>
  </div>
  <div class="listings-section-header">
    <span class="listings-section-title" id="section-title">최신 판매글</span>
    <div class="tab-sort" id="sort-tabs">
      <button class="sort-btn active" id="sort-latest" onclick="setSort('latest')">최신순</button>
      <span class="sort-divider">|</span>
      <button class="sort-btn" id="sort-price" onclick="setSort('price')">가격순</button>
    </div>
  </div>
  <div id="listings-container">
    <div class="loading">불러오는 중...</div>
  </div>
  <a href="#" class="btn-more" id="more-btn" style="display:none;">계정 더보기</a>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="/js/config.js"></script>
<script src="/js/listings.js"></script>
<script>
  document.getElementById('navbar').innerHTML = renderNavbar('home')

  let currentSort = 'latest'
  let currentPage = 1
  let currentSearch = ''
  let searchTimer = null

  function setSort(sort) {
    currentSort = sort
    currentPage = 1
    document.getElementById('sort-latest').classList.toggle('active', sort === 'latest')
    document.getElementById('sort-price').classList.toggle('active', sort === 'price')
    loadListings({ container: 'listings-container', limit: 12, sort, moreBtn: 'more-btn', search: currentSearch })
  }

  function handleSearch(value) {
    clearTimeout(searchTimer)
    searchTimer = setTimeout(() => {
      currentSearch = value.trim()
      currentPage = 1
      const title = document.getElementById('section-title')
      const sortTabs = document.getElementById('sort-tabs')
      if (currentSearch) {
        title.textContent = `"${currentSearch}" 검색 결과`
        sortTabs.style.display = 'none'
      } else {
        title.textContent = '최신 판매글'
        sortTabs.style.display = ''
      }
      loadListings({ container: 'listings-container', limit: 12, sort: currentSort, moreBtn: 'more-btn', search: currentSearch })
    }, 350)
  }

  document.getElementById('more-btn').addEventListener('click', e => {
    e.preventDefault()
    currentPage++
    loadListings({ container: 'listings-container', limit: 12, sort: currentSort, page: currentPage, append: true, moreBtn: 'more-btn', search: currentSearch })
  })

  loadListings({ container: 'listings-container', limit: 12, moreBtn: 'more-btn' })
  loadAndRenderGameUI(null)
</script>
<div id="footer"></div>
</body>
</html>
