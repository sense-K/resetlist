<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>리셋리스트 - 모바일 게임 리세계 직거래 플랫폼</title>
  <meta name="description" content="원신, 블루아카이브, 니케, 쿠키런킹덤 리세계 계정 직거래. 안전하고 빠른 리세계 계정 거래 플랫폼 리셋리스트.">
  <meta property="og:title" content="리셋리스트 - 리세계 직거래 플랫폼">
  <meta property="og:description" content="모바일 게임 리세계 계정 직거래를 한 곳에서.">
  <meta property="og:type" content="website">
  <link rel="stylesheet" href="/css/style.css">
</head>
<body>

<div id="navbar"></div>

<!-- 히어로 -->
<section class="hero">
  <div class="hero-inner">
    <div class="hero-text">
      <h1>리세계 직거래,<br>지금 시작하세요.</h1>
    </div>
    <div class="hero-collage" id="hero-collage"></div>
  </div>
</section>

<!-- 게임 선택 카드 -->
<section class="game-select-section">
  <div class="game-select-inner">
    <div class="game-select-header">
      <span class="game-select-title">거래소 바로가기</span>
    </div>
    <div class="game-cards-grid" id="game-cards-section"></div>
  </div>
</section>

<!-- 최신 매물 -->
<div class="page-wrapper">
  <div class="listings-section-header">
    <span class="listings-section-title">최신 매물</span>
    <div class="tab-sort">
      <button class="sort-btn active" id="sort-latest" onclick="setSort('latest')">최신순</button>
      <span class="sort-divider">|</span>
      <button class="sort-btn" id="sort-price" onclick="setSort('price')">가격순</button>
    </div>
  </div>
  <div id="listings-container">
    <div class="loading">불러오는 중...</div>
  </div>
  <a href="#" class="btn-more" id="more-btn" style="display:none;">계정 더보기</a>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="/js/config.js"></script>
<script src="/js/listings.js"></script>
<script>
  document.getElementById('navbar').innerHTML = renderNavbar('home')

  let currentSort = 'latest'
  function setSort(sort) {
    currentSort = sort
    document.getElementById('sort-latest').classList.toggle('active', sort === 'latest')
    document.getElementById('sort-price').classList.toggle('active', sort === 'price')
    loadListings({ container: 'listings-container', limit: 12, sort })
  }

  loadListings({ container: 'listings-container', limit: 12 })
  loadAndRenderGameUI(null)
</script>
<div id="footer"></div>
</body>
</html>
