  <script type="application/ld+json">
  {
    "@context": "https://schema.org",
    "@type": "WebSite",
    "name": "플레이센스",
    "url": "https://resetlist.kr",
    "description": "모바일 게임 공략 도구, 도감, 시뮬레이터 모음과 리세계 계정거래 플랫폼",
    "potentialAction": {
      "@type": "SearchAction",
      "target": {
        "@type": "EntryPoint",
        "urlTemplate": "https://resetlist.kr/trade/?q={search_term_string}"
      },
      "query-input": "required name=search_term_string"
    }
  }
  </script>
  <link rel="stylesheet" href="/css/style.css">
  <style>
    /* 게임 공략 그리드 (메인 전용) */
    .guide-game-grid {
      display: grid;
      grid-template-columns: 1fr;
      gap: 16px;
    }
    @media (min-width: 768px) {
      .guide-game-grid { grid-template-columns: 1fr 1fr; }
    }

    .guide-game-card {
      background: #fff;
      border: 1px solid var(--border, #e5e7eb);
      border-radius: 16px;
      overflow: hidden;
      transition: transform 0.15s, box-shadow 0.15s;
    }
    .guide-game-card:hover {
      transform: translateY(-3px);
      box-shadow: 0 8px 24px rgba(0,0,0,0.07);
    }

    .guide-card-header {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 14px 16px;
      border-bottom: 1px solid var(--border, #e5e7eb);
      text-decoration: none;
      color: inherit;
      transition: background 0.12s;
    }
    .guide-card-header:hover { background: #f8fafc; }

    .guide-card-img {
      width: 36px; height: 36px;
      border-radius: 9px;
      object-fit: cover;
      flex-shrink: 0;
    }
    .guide-card-emoji {
      width: 36px; height: 36px;
      font-size: 26px;
      display: flex; align-items: center; justify-content: center;
      flex-shrink: 0;
    }
    .guide-card-info { flex: 1; min-width: 0; }
    .guide-card-name {
      font-size: 14px; font-weight: 800;
      color: var(--black, #1e293b);
      white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
    }
    .guide-card-count { font-size: 11px; color: var(--text-sub, #64748b); margin-top: 1px; }
    .guide-card-arrow { color: #cbd5e1; flex-shrink: 0; }

    /* 칩 컨테이너 */
    .guide-chips {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
      padding: 12px 14px;
    }

    /* 공략 칩 */
    .guide-chip {
      display: inline-flex;
      align-items: center;
      gap: 5px;
      padding: 5px 11px;
      border-radius: 999px;
      border: 1px solid var(--border, #e2e8f0);
      background: #fff;
      font-size: 12px;
      font-weight: 600;
      color: var(--text-primary, #1e293b);
      text-decoration: none;
      line-height: 1;
      transition: background 0.12s, border-color 0.12s;
      white-space: nowrap;
    }
    .guide-chip:hover {
      background: #f1f5f9;
      border-color: #94a3b8;
    }
    .guide-chip-icon { flex-shrink: 0; opacity: 0.55; line-height: 0; }
    .guide-chip.is-new {
      border-color: #6366f1;
      color: #4338ca;
      font-weight: 700;
    }
    .guide-chip.is-new .guide-chip-icon { opacity: 0.8; }
    .guide-chip.is-new:hover { background: #eef2ff; }
    .guide-chip-new-tag {
      font-size: 9px; font-weight: 800;
      background: #fbbf24; color: #78350f;
      padding: 1px 4px; border-radius: 3px;
      margin-left: 2px; line-height: 1.5;
    }
  </style>
</head>
<body>

<div id="navbar"></div>

<!-- 히어로 -->
<section class="hero">
  <div class="hero-collage" id="hero-collage"></div>
  <div class="hero-overlay"></div>
  <div class="hero-inner">
    <div class="hero-text">
      <h1>모바일 게임,<br>더 깊이 즐기세요.</h1>
      <p style="font-size:16px;color:rgba(255,255,255,0.8);margin-top:12px;font-weight:400;">공략 도구 · 도감 · 시뮬레이터 · 계정거래</p>
    </div>
  </div>
</section>

<!-- 게임 공략 카드 -->
<section class="game-select-section">
  <div class="game-select-inner">
    <div class="game-select-header">
      <h2 class="game-select-title">게임별 공략</h2>
    </div>
    <div class="guide-game-grid" id="guide-game-section"></div>
  </div>
</section>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="/js/config.js"></script>
<script>
  document.getElementById('navbar').innerHTML = renderNavbar('home')
  loadAndRenderGameUI(null)
</script>
<div id="footer"></div>
</body>
</html>
