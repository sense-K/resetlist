<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>더미 데이터 생성</title>
  <meta name="robots" content="noindex">
  <style>
    body { font-family: system-ui; background: #f4f4f4; display: flex; align-items: center; justify-content: center; min-height: 100vh; margin: 0; }
    .box { background: #fff; border-radius: 16px; padding: 36px 40px; width: 520px; box-shadow: 0 4px 24px rgba(0,0,0,0.1); }
    h2 { margin: 0 0 8px; font-size: 20px; }
    p { color: #64748b; font-size: 13px; margin: 0 0 24px; }
    .log { background: #111; color: #4ade80; border-radius: 10px; padding: 16px; font-size: 12px; font-family: monospace; height: 280px; overflow-y: auto; margin-bottom: 20px; white-space: pre-wrap; }
    button { padding: 12px 28px; border-radius: 10px; border: none; background: #6c47ff; color: #fff; font-size: 15px; font-weight: 700; cursor: pointer; width: 100%; }
    button:disabled { opacity: 0.5; cursor: default; }
  </style>
</head>
<body>
<div class="box">
  <h2>🚂 스타레일 더미 판매완료 글 생성</h2>
  <p>현재 로그인된 계정으로 붕괴: 스타레일 판매완료(sold) 더미 글 30개를 생성합니다.</p>
  <div class="log" id="log">버튼을 눌러 시작하세요...\n</div>
  <button id="btn" onclick="runSeed()">30개 생성 시작</button>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="/js/config.js"></script>
<script>
  function log(msg) {
    const el = document.getElementById('log')
    el.textContent += msg + '\n'
    el.scrollTop = el.scrollHeight
  }

  const DUMMY_DESCS = [
    '쾌적하게 플레이했습니다. 직거래 환영.',
    '5성 다수 보유. 협상 가능합니다.',
    '초반부터 키운 계정입니다. 믿고 구매하세요.',
    '개척 레벨 70. 캐릭터 풍부합니다.',
    '라이트닝 기반 덱 완성. 즉시 거래 가능.',
    '세계 레벨 6 달성 계정입니다.',
    '기억의 혼돈 12층 클리어.',
    '별 3개 만렙 캐릭터 다수 보유.',
    '급하게 처분합니다. 가격 협의 가능.',
    '한정 캐릭터 여러 명 보유 중입니다.',
    '균형 잡힌 계정. 공격/방어 모두 가능.',
    '개척 60+ 안정적인 계정입니다.',
    '정착 계정 판매합니다. 성능 보장.',
    '미사용 유물 다수 보유. 바로 세팅 가능.',
    '개척 미션 전부 클리어.',
  ]

  const PRICES = [
    18000, 22000, 25000, 30000, 35000, 40000, 45000, 50000,
    55000, 60000, 70000, 75000, 80000, 90000, 100000,
    110000, 120000, 130000, 150000, 170000, 190000, 200000,
    220000, 250000, 280000, 300000, 350000, 400000, 450000, 500000,
  ]

  function shuffle(arr) {
    return [...arr].sort(() => Math.random() - 0.5)
  }

  function randomInt(min, max) {
    return Math.floor(Math.random() * (max - min + 1)) + min
  }

  async function runSeed() {
    const btn = document.getElementById('btn')
    btn.disabled = true
    document.getElementById('log').textContent = ''

    try {
      // 1. 세션 확인
      const { data: { session } } = await db.auth.getSession()
      if (!session) { log('❌ 로그인이 필요합니다. /auth/ 에서 먼저 로그인하세요.'); btn.disabled = false; return }
      const authUserId = session.user.id
      log(`✅ 로그인 확인: ${session.user.email}`)

      // 2. User 테이블에서 userId 조회
      const { data: userRows } = await db.from('User').select('id').eq('id', authUserId).limit(1)
      let userId = userRows?.[0]?.id
      if (!userId) {
        // auth UUID와 User.id가 다를 경우 email로 시도
        const { data: userByEmail } = await db.from('User').select('id').eq('email', session.user.email).limit(1)
        userId = userByEmail?.[0]?.id
      }
      if (!userId) {
        // User 테이블에 이메일 컬럼이 없을 수 있으므로 첫 번째 유저 사용
        const { data: anyUser } = await db.from('User').select('id').limit(1)
        userId = anyUser?.[0]?.id
      }
      if (!userId) { log('❌ User 테이블에서 userId를 찾을 수 없어요.'); btn.disabled = false; return }
      log(`✅ userId: ${userId}`)

      // 3. starrail 게임 ID 조회
      const { data: games } = await db.from('Game').select('id').eq('slug', 'starrail').limit(1)
      const gameId = games?.[0]?.id
      if (!gameId) { log('❌ starrail 게임이 없어요. 게임 관리에서 먼저 추가하세요.'); btn.disabled = false; return }
      log(`✅ starrail gameId: ${gameId}`)

      // 4. starrail 서버 목록 조회
      const { data: servers } = await db.from('Server').select('id, nameKo').eq('gameId', gameId)
      if (!servers || servers.length === 0) { log('❌ starrail 서버가 없어요. 서버 관리에서 먼저 추가하세요.'); btn.disabled = false; return }
      log(`✅ 서버 ${servers.length}개: ${servers.map(s => s.nameKo).join(', ')}`)

      // 5. starrail 캐릭터 목록 조회
      const { data: chars } = await db.from('Character').select('id, nameKo').eq('gameId', gameId).limit(20)
      log(`✅ 캐릭터 ${chars?.length ?? 0}개 로드`)

      // 6. 30개 더미 글 생성
      const shuffledPrices = shuffle(PRICES)
      let success = 0

      for (let i = 0; i < 30; i++) {
        const server = servers[i % servers.length]
        const price = shuffledPrices[i] ?? randomInt(20000, 500000)
        const desc = DUMMY_DESCS[i % DUMMY_DESCS.length]
        const daysAgo = randomInt(1, 60)
        const createdAt = new Date(Date.now() - daysAgo * 86400000).toISOString()
        const now = new Date().toISOString()

        const { data: listing, error } = await db.from('Listing').insert({
          id: crypto.randomUUID(),
          gameId,
          userId,
          serverId: server.id,
          price,
          description: desc,
          screenshots: [],
          status: 'sold',
          isBulkListing: false,
          viewCount: randomInt(5, 200),
          createdAt,
          updatedAt: now,
        }).select('id').single()

        if (error) {
          log(`❌ [${i + 1}] 오류: ${error.message}`)
          continue
        }

        // 캐릭터 1~3개 연결
        if (chars && chars.length > 0) {
          const picked = shuffle(chars).slice(0, randomInt(1, Math.min(3, chars.length)))
          await db.from('ListingCharacter').insert(
            picked.map(c => ({ listingId: listing.id, characterId: c.id }))
          )
        }

        success++
        log(`✅ [${i + 1}/30] ${server.nameKo} / ${price.toLocaleString()}원 / sold`)
      }

      log(`\n🎉 완료! ${success}/30개 생성됨`)
    } catch(e) {
      log(`❌ 예외: ${e.message}`)
    }

    btn.disabled = false
    btn.textContent = '다시 생성'
  }
</script>
</body>
</html>
