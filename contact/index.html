<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <link rel="icon" type="image/svg+xml" href="/favicon.svg">
  <link rel="shortcut icon" href="/favicon.svg">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>문의하기 | 리세 리스트</title>
  <meta name="description" content="리세 리스트 서비스 이용 중 궁금한 점이나 불편한 사항을 문의해주세요.">
  <link rel="stylesheet" href="/css/style.css">
  <style>
    .contact-wrap {
      max-width: 560px;
      margin: 0 auto;
      padding: 40px 20px 80px;
    }
    .contact-header {
      margin-bottom: 32px;
    }
    .contact-header h1 {
      font-size: 26px;
      font-weight: 900;
      margin-bottom: 8px;
    }
    .contact-header p {
      font-size: 14px;
      color: var(--text-muted);
      line-height: 1.6;
    }
    .contact-card {
      background: #fff;
      border: 1.5px solid var(--border);
      border-radius: 16px;
      padding: 28px;
    }
    .success-box {
      display: none;
      text-align: center;
      padding: 48px 24px;
    }
    .success-box .success-icon {
      font-size: 48px;
      margin-bottom: 16px;
    }
    .success-box h2 {
      font-size: 20px;
      font-weight: 800;
      margin-bottom: 8px;
    }
    .success-box p {
      font-size: 14px;
      color: var(--text-muted);
      line-height: 1.6;
    }
  </style>
</head>
<body>
<div id="navbar"></div>

<div class="contact-wrap">
  <div class="contact-header">
    <h1>문의하기</h1>
    <p>서비스 이용 중 궁금한 점이나 불편한 사항을 남겨주세요.<br>확인 후 빠르게 답변 드릴게요.</p>
  </div>

  <div class="contact-card">
    <!-- 전송 완료 메시지 -->
    <div class="success-box" id="success-box">
      <div class="success-icon">✅</div>
      <h2>문의가 접수됐어요</h2>
      <p>빠른 시일 내에 답변 드릴게요.<br>입력하신 이메일을 확인해주세요.</p>
    </div>

    <!-- 문의 폼 -->
    <form id="contact-form" action="https://formspree.io/f/mwvwdvvq" method="POST">
      <div class="form-group">
        <label class="form-label">이름 <span style="color:red">*</span></label>
        <input type="text" name="name" class="form-input" placeholder="홍길동" required>
      </div>
      <div class="form-group">
        <label class="form-label">이메일 <span style="color:red">*</span></label>
        <input type="email" name="email" class="form-input" placeholder="example@email.com" required>
      </div>
      <div class="form-group">
        <label class="form-label">문의 유형</label>
        <select name="category" class="form-select">
          <option value="">선택해주세요</option>
          <option value="거래 문의">거래 문의</option>
          <option value="계정 문의">계정 문의</option>
          <option value="신고">신고</option>
          <option value="서비스 제안">서비스 제안</option>
          <option value="기타">기타</option>
        </select>
      </div>
      <div class="form-group">
        <label class="form-label">문의 내용 <span style="color:red">*</span></label>
        <textarea name="message" class="form-textarea" placeholder="문의하실 내용을 자세히 적어주세요." rows="6" required style="min-height:140px;"></textarea>
      </div>
      <button type="submit" class="btn btn-primary btn-full" id="submit-btn">문의 보내기</button>
    </form>
  </div>
</div>

<div id="footer"></div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="/js/config.js"></script>
<script>
  document.getElementById('navbar').innerHTML = renderNavbar()
  loadAndRenderGameUI(null)

  document.getElementById('contact-form').addEventListener('submit', async function(e) {
    e.preventDefault()
    const btn = document.getElementById('submit-btn')
    btn.disabled = true
    btn.textContent = '전송 중...'

    const res = await fetch(this.action, {
      method: 'POST',
      body: new FormData(this),
      headers: { 'Accept': 'application/json' }
    })

    if (res.ok) {
      document.getElementById('contact-form').style.display = 'none'
      document.getElementById('success-box').style.display = 'block'
    } else {
      alert('전송에 실패했어요. 잠시 후 다시 시도해주세요.')
      btn.disabled = false
      btn.textContent = '문의 보내기'
    }
  })
</script>
</body>
</html>
