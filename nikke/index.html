<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>니케 리세계 판매 | 리스트업</title>
  <meta name="description" content="니케 리세계 계정 직거래. 니케 판매계정, 니케 리세계 거래.">
  <link rel="stylesheet" href="/css/style.css">
</head>
<body>
<div id="navbar"></div>
<div class="tab-bar">
  <div class="tab-bar-inner">
    <span class="tab-section-title">모든 계정</span>
    <div class="tab-divider"></div>
    <div class="tab-list">
      <a href="/" class="tab-item">전체</a>
      <a href="/genshin/" class="tab-item">🌙 원신</a>
      <a href="/bluearchive/" class="tab-item">📘 블루아카이브</a>
      <a href="/nikke/" class="tab-item active">⚡ 니케</a>
      <a href="/cookierunkingdom/" class="tab-item">🍪 쿠키런킹덤</a>
    </div>
  </div>
</div>
<div class="page-wrapper">
  <div class="layout-with-sidebar">
    <aside class="sidebar">
      <div id="sidebar-games"></div>
      <div class="sidebar-section">
        <div class="sidebar-label">서버</div>
        <select class="form-select" id="server-filter"><option value="">전체 서버</option></select>
      </div>
    </aside>
    <div class="content-area">
      <div class="content-header">
        <div class="content-title" id="game-page-title">니케 계정</div>
        <span class="content-count" id="listing-count"></span>
      </div>
      <div id="listings-container"><div class="loading">불러오는 중...</div></div>
    </div>
  </div>
</div>
<a href="/trade/register.html" class="fab">판매하기 ↗</a>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="/js/config.js"></script>
<script src="/js/listings.js"></script>
<script>
  const GAME_SLUG = 'nikke'
  document.getElementById('navbar').innerHTML = renderNavbar()
  document.getElementById('sidebar-games').innerHTML = renderSidebarGames(GAME_SLUG)
  async function loadServers() {
    const { data: game } = await db.from('Game').select('id').eq('slug', GAME_SLUG).single()
    if (!game) return
    const { data: servers } = await db.from('Server').select('id, nameKo').eq('gameId', game.id)
    const sel = document.getElementById('server-filter')
    servers?.forEach(s => { const o = document.createElement('option'); o.value = s.id; o.textContent = s.nameKo; sel.appendChild(o) })
    sel.addEventListener('change', () => loadListings({ container: 'listings-container', gameSlug: GAME_SLUG, serverId: sel.value || undefined }))
  }
  async function updateCount() {
    const { data: game } = await db.from('Game').select('id').eq('slug', GAME_SLUG).single()
    if (!game) return
    const { count } = await db.from('Listing').select('*', { count: 'exact', head: true }).eq('status', 'active').eq('gameId', game.id)
    document.getElementById('listing-count').textContent = count + '개'
  }
  loadAndRenderGameUI(GAME_SLUG); loadServers(); updateCount()
  loadListings({ container: 'listings-container', gameSlug: GAME_SLUG })
</script>
<div id="footer"></div>
</body>
</html>
