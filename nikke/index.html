<body>
<div id="navbar"></div>

<div class="page-wrapper">
  <div class="layout-with-sidebar">
    <aside class="sidebar">
      <div id="sidebar-games"></div>
      <div class="sidebar-section">
        <div class="sidebar-label">서버</div>
        <select class="form-select" id="server-filter">

    </aside>
    <div class="content-area">

        <span class="content-count" id="listing-count"></span>
      </div>
      <div class="search-bar-wrap" style="margin-bottom:12px;">
        <input type="text" id="search-input" class="search-bar-input" placeholder="캐릭터명, 설명으로 검색..." oninput="handleSearch(this.value)">

      </div>
      <div id="listings-container"><div class="loading">불러오는 중...</div></div>
  <button class="btn-more" id="more-btn" style="display:none;" onclick="loadMore()">계정 더보기</button>
    </div>
  </div>
</div>

<a href="/trade/register.html" class="fab">판매하기 ↗</a>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="/js/config.js"></script>
<script src="/js/listings.js"></script>
<script>
  const GAME_SLUG = 'nikke'
  document.getElementById('navbar').innerHTML = renderNavbar()
  document.getElementById('sidebar-games').innerHTML = renderSidebarGames(GAME_SLUG)

  async function loadServers() {
    const { data: game } = await db.from('Game').select('id').eq('slug', GAME_SLUG).single()
    if (!game) return
    const { data: servers } = await db.from('Server').select('id, nameKo').eq('gameId', game.id)
    const sel = document.getElementById('server-filter')
    servers?.forEach(s => { const o = document.createElement('option'); o.value = s.id; o.textContent = s.nameKo; sel.appendChild(o) })
    sel.addEventListener('change', () => loadPage(1))
  }

  async function updateCount() {
    const { data: game } = await db.from('Game').select('id').eq('slug', GAME_SLUG).single()
    if (!game) return
    const { count } = await db.from('Listing').select('*', { count: 'exact', head: true }).eq('status', 'active').eq('gameId', game.id)
    document.getElementById('listing-count').textContent = count + '개'
  }

  let currentPage = 1
  let currentSearch = ''
  let searchTimer = null

  function handleSearch(value) {
    clearTimeout(searchTimer)
    searchTimer = setTimeout(() => {
      currentSearch = value.trim()
      loadPage(1)
    }, 350)
  }

  function loadPage(p = 1) {
    currentPage = p
    loadListings({ container: 'listings-container', gameSlug: GAME_SLUG, serverId: document.getElementById('server-filter').value || undefined, page: p, moreBtn: 'more-btn', search: currentSearch })
  }
  function loadMore() {
    currentPage++
    loadListings({ container: 'listings-container', gameSlug: GAME_SLUG, serverId: document.getElementById('server-filter').value || undefined, page: currentPage, append: true, moreBtn: 'more-btn', search: currentSearch })
  }

  loadAndRenderGameUI(GAME_SLUG); loadServers(); updateCount(); loadPage(1)
</script>
<div id="footer"></div>
</body>
