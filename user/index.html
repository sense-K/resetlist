<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>판매자 프로필 | 리스트업</title>
  <link rel="stylesheet" href="/css/style.css">
  <style>
    .profile-wrap {
      max-width: 720px;
      margin: 0 auto;
      padding: 32px 20px 60px;
    }
    .user-card {
      background: #111;
      border-radius: 16px;
      padding: 28px;
      display: flex;
      align-items: center;
      gap: 20px;
      margin-bottom: 28px;
      color: #fff;
    }
    .user-avatar {
      width: 64px; height: 64px;
      border-radius: 50%;
      background: #333;
      display: flex; align-items: center; justify-content: center;
      font-size: 30px;
      flex-shrink: 0;
    }
    .user-info { flex: 1; }
    .user-nickname { font-size: 22px; font-weight: 900; margin-bottom: 6px; }
    .user-stats {
      display: flex;
      gap: 16px;
      flex-wrap: wrap;
    }
    .user-stat {
      display: flex;
      flex-direction: column;
      align-items: center;
      background: rgba(255,255,255,0.1);
      border-radius: 10px;
      padding: 10px 18px;
      min-width: 64px;
    }
    .user-stat-value { font-size: 20px; font-weight: 900; }
    .user-stat-label { font-size: 11px; color: rgba(255,255,255,0.6); margin-top: 2px; }

    .section-title {
      font-size: 15px;
      font-weight: 800;
      margin-bottom: 14px;
      color: #111;
    }

    .review-list { margin-bottom: 28px; }
    .review-item {
      padding: 14px 0;
      border-bottom: 1px solid var(--border);
    }
    .review-item:last-child { border-bottom: none; }
    .review-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 6px;
    }
    .review-stars { font-size: 14px; letter-spacing: 1px; }
    .review-date { font-size: 11px; color: #aaa; }
    .review-content { font-size: 13px; color: #444; line-height: 1.6; }
    .review-empty { text-align: center; padding: 32px; color: #aaa; font-size: 13px; }

    .listing-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
      gap: 12px;
    }
  </style>
</head>
<body>
<div id="navbar"></div>

<div class="profile-wrap">
  <div id="profile-content">
    <div style="text-align:center;padding:60px;color:#888;">불러오는 중...</div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="/js/config.js"></script>
<script src="/js/listings.js"></script>
<script>
  document.getElementById('navbar').innerHTML = renderNavbar()

  const userId = new URLSearchParams(location.search).get('id')
  if (!userId) {
    document.getElementById('profile-content').innerHTML = '<div style="text-align:center;padding:60px;color:#888;">잘못된 접근이에요.</div>'
  } else {
    loadProfile()
  }

  async function loadProfile() {
    const [{ data: user }, { data: reviews }, { data: listings }] = await Promise.all([
      db.from('User').select('id, nickname, tradeCount, avgRating').eq('id', userId).single(),
      db.from('Review').select('rating, content, createdAt').eq('sellerId', userId).order('createdAt', { ascending: false }).limit(10),
      db.from('Listing').select(`
        id, price, status, createdAt,
        game:Game(nameKo, emoji, artImageUrl),
        characters:ListingCharacter(character:Character(nameKo, tier))
      `).eq('userId', userId).in('status', ['active', 'trading']).order('createdAt', { ascending: false })
    ])

    if (!user) {
      document.getElementById('profile-content').innerHTML = '<div style="text-align:center;padding:60px;color:#888;">유저를 찾을 수 없어요.</div>'
      return
    }

    document.title = `${user.nickname} | 리스트업`

    const avgRating = user.avgRating ? Number(user.avgRating).toFixed(1) : null
    const stars = avgRating ? '⭐'.repeat(Math.round(avgRating)) : ''

    const reviewsHtml = reviews?.length > 0
      ? reviews.map(r => {
          const starStr = '⭐'.repeat(r.rating) + '☆'.repeat(5 - r.rating)
          return `
            <div class="review-item">
              <div class="review-header">
                <span class="review-stars">${starStr}</span>
                <span class="review-date">${timeAgo(r.createdAt)}</span>
              </div>
              ${r.content ? `<div class="review-content">${r.content}</div>` : '<div class="review-content" style="color:#bbb;">내용 없음</div>'}
            </div>`
        }).join('')
      : '<div class="review-empty">아직 받은 리뷰가 없어요</div>'

    const listingsHtml = listings?.length > 0
      ? `<div id="user-listings-grid"></div>`
      : '<div style="text-align:center;padding:24px;color:#aaa;font-size:13px;">판매 중인 계정이 없어요</div>'

    document.getElementById('profile-content').innerHTML = `
      <div class="user-card">
        <div class="user-avatar">👤</div>
        <div class="user-info">
          <div class="user-nickname">${user.nickname}</div>
          <div class="user-stats">
            <div class="user-stat">
              <span class="user-stat-value">${user.tradeCount ?? 0}</span>
              <span class="user-stat-label">거래완료</span>
            </div>
            <div class="user-stat">
              <span class="user-stat-value">${avgRating ?? '-'}</span>
              <span class="user-stat-label">평균 별점</span>
            </div>
            <div class="user-stat">
              <span class="user-stat-value">${reviews?.length ?? 0}</span>
              <span class="user-stat-label">리뷰수</span>
            </div>
          </div>
        </div>
      </div>

      <div class="section-title">판매 중인 계정 (${listings?.length ?? 0}개)</div>
      ${listingsHtml}

      <div class="section-title" style="margin-top:28px;">받은 리뷰</div>
      <div class="review-list">${reviewsHtml}</div>
    `

    if (listings?.length > 0) {
      const el = document.getElementById('user-listings-grid')
      el.innerHTML = `<div class="listings-grid">${listings.map(renderListingCard).join('')}</div>`
    }
  }
</script>
<div id="footer"></div>
</body>
</html>
