  <div id="footer-container"></div>
  <script>
    const GAME_SLUG = 'leehwan'
    async function loadGameHero() {
      const { data: game } = await db.from('Game').select('imageUrl, artImageUrl').eq('slug', GAME_SLUG).single()
      if (!game) return
      if (game.artImageUrl) document.getElementById('game-hub-hero-bg').style.backgroundImage = `url('${game.artImageUrl}')`
      if (game.imageUrl) {
        const icon = document.getElementById('game-hub-app-icon'), emoji = document.getElementById('game-hub-emoji')
        icon.src = game.imageUrl; icon.alt = '이환'; icon.style.display = 'block'
        if (emoji) emoji.style.display = 'none'
      }
    }
    loadGameHero()
    document.getElementById('navbar-container').innerHTML = renderNavbar()
    loadAndRenderGameUI('leehwan')
    document.getElementById('footer-container').innerHTML = typeof renderFooter === 'function' ? renderFooter() : ''
  </script>
