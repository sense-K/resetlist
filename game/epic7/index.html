<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>에픽세븐 공략 - 플레이센스</title>
  <meta name="description" content="에픽세븐 RTA 드래프트 도우미, 영웅 도감, 아티팩트 도감, 장비 주인 찾기 등 다양한 공략 도구를 제공합니다." />
  <meta name="keywords" content="에픽세븐 공략, 에픽세븐 RTA, 에픽세븐 영웅 도감, 에픽세븐 아티팩트, 에픽세븐 장비" />
  <link rel="canonical" href="https://resetlist.kr/game/epic7/" />
  <meta property="og:title" content="에픽세븐 공략 - 플레이센스" />
  <meta property="og:description" content="에픽세븐 RTA 드래프트 도우미, 영웅 도감, 아티팩트 도감, 장비 주인 찾기 등 다양한 공략 도구를 제공합니다." />
  <meta property="og:url" content="https://resetlist.kr/game/epic7/" />
  <meta property="og:type" content="website" />
  <link rel="stylesheet" href="/css/style.css" />
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="/js/config.js"></script>
  <style>
    .game-hub-wrap { max-width: 900px; margin: 0 auto; padding: 32px 16px; }
    .game-hub-header {
      display: flex; align-items: center; gap: 16px;
      margin-bottom: 32px;
    }
    .game-hub-icon { font-size: 48px; line-height: 1; }
    .game-hub-title { font-size: 24px; font-weight: 800; color: var(--text, #1e293b); }
    .game-hub-sub { font-size: 14px; color: var(--text-sub, #64748b); margin-top: 4px; }
    .section-label {
      font-size: 12px; font-weight: 700; color: var(--text-sub, #64748b);
      text-transform: uppercase; letter-spacing: 0.05em;
      margin-bottom: 12px; padding-bottom: 8px;
      border-bottom: 1px solid var(--border, #e5e7eb);
    }
    .tools-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
      gap: 14px; margin-bottom: 40px;
    }
    .tool-card {
      background: #fff; border: 1px solid var(--border, #e5e7eb);
      border-radius: 16px; padding: 20px; text-decoration: none;
      display: flex; flex-direction: column; gap: 8px;
      transition: transform 0.15s, box-shadow 0.15s;
    }
    .tool-card:hover { transform: translateY(-2px); box-shadow: 0 6px 20px rgba(0,0,0,0.08); }
    .tool-card-top { display: flex; align-items: center; justify-content: space-between; }
    .tool-card-icon {
      width: 36px; height: 36px; border-radius: 10px;
      display: flex; align-items: center; justify-content: center; font-size: 18px;
    }
    .badge-live { background: rgba(59,130,246,0.1); color: #3b82f6; font-size: 10px; font-weight: 700; padding: 3px 8px; border-radius: 999px; }
    .tool-card-title { font-size: 14px; font-weight: 700; color: #1e293b; }
    .tool-card-desc { font-size: 12px; color: #64748b; line-height: 1.5; }
    .trade-section { display: flex; gap: 12px; flex-wrap: wrap; }
    .trade-btn {
      display: inline-flex; align-items: center; gap: 8px;
      padding: 14px 24px; border-radius: 14px; text-decoration: none;
      font-size: 15px; font-weight: 700; transition: transform 0.15s, box-shadow 0.15s;
    }
    .trade-btn:hover { transform: translateY(-2px); box-shadow: 0 4px 16px rgba(0,0,0,0.12); }
    .trade-btn-primary { background: #6c47ff; color: #fff; }
    .trade-btn-secondary { background: #f1f5f9; color: #1e293b; border: 1.5px solid var(--border, #e5e7eb); }
  </style>
</head>
<body>
  <div id="navbar-container"></div>

  <main class="game-hub-wrap">
    <div class="game-hub-header">
      <div class="game-hub-icon">⚔️</div>
      <div>
        <div class="game-hub-title">에픽세븐 (Epic Seven)</div>
        <div class="game-hub-sub">공략 도구 4종 서비스 중</div>
      </div>
    </div>

    <div class="section-label">공략 도구</div>
    <div class="tools-grid">
      <a href="/game/epic7/rta/" class="tool-card">
        <div class="tool-card-top">
          <div class="tool-card-icon" style="background:rgba(59,130,246,0.1)">⚔️</div>
          <span class="badge-live">서비스 중</span>
        </div>
        <div class="tool-card-title">RTA 드래프트 도우미</div>
        <div class="tool-card-desc">실시간 밴픽 추천, 시너지·카운터 영웅</div>
      </a>
      <a href="/game/epic7/heroes/" class="tool-card">
        <div class="tool-card-top">
          <div class="tool-card-icon" style="background:rgba(34,197,94,0.1)">📖</div>
          <span class="badge-live">서비스 중</span>
        </div>
        <div class="tool-card-title">영웅 도감</div>
        <div class="tool-card-desc">장비 세팅, 추천 스탯, 시너지·카운터</div>
      </a>
      <a href="/game/epic7/artifacts/" class="tool-card">
        <div class="tool-card-top">
          <div class="tool-card-icon" style="background:rgba(234,179,8,0.1)">💎</div>
          <span class="badge-live">서비스 중</span>
        </div>
        <div class="tool-card-title">아티팩트 도감</div>
        <div class="tool-card-desc">직업별·등급별 필터, 영웅 사용 현황</div>
      </a>
      <a href="/game/epic7/gear-recommend/" class="tool-card">
        <div class="tool-card-top">
          <div class="tool-card-icon" style="background:rgba(168,85,247,0.1)">🔍</div>
          <span class="badge-live">서비스 중</span>
        </div>
        <div class="tool-card-title">장비 주인 찾기</div>
        <div class="tool-card-desc">장비 스탯 입력 → 어울리는 영웅 추천</div>
      </a>
    </div>

    <div class="section-label">다른 게임 보기</div>
    <div class="trade-section">
      <a href="/" class="trade-btn trade-btn-secondary">🎮 전체 게임 목록</a>
      <a href="/trade/" class="trade-btn trade-btn-secondary">🏪 거래소 바로가기</a>
    </div>
  </main>

  <div id="footer-container"></div>
  <script>
    document.getElementById('navbar-container').innerHTML = renderNavbar();
    loadAndRenderGameUI(null);
    document.getElementById('footer-container').innerHTML = typeof renderFooter === 'function' ? renderFooter() : '';
  </script>
</body>
</html>
