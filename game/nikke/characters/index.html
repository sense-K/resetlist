<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <link rel="icon" type="image/svg+xml" href="/favicon.svg">
  <link rel="shortcut icon" href="/favicon.svg">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>니케 캐릭터 도감 | 플레이센스</title>
  <meta name="description" content="승리의 여신 니케 전체 캐릭터 도감. SSS~C 티어별 필터와 이름 검색으로 원하는 니케를 빠르게 찾아보세요.">
  <meta name="keywords" content="니케 캐릭터 도감, 니케 캐릭터 목록, 니케 티어표, 니케 SSR, 니케 캐릭터 이미지, NIKKE characters">
  <link rel="canonical" href="https://resetlist.kr/game/nikke/characters/">
  <meta property="og:type" content="website">
  <meta property="og:url" content="https://resetlist.kr/game/nikke/characters/">
  <meta property="og:title" content="니케 캐릭터 도감 | 플레이센스">
  <meta property="og:description" content="승리의 여신 니케 전체 캐릭터 도감. SSS~C 티어별 필터로 원하는 니케를 빠르게 찾아보세요.">
  <meta property="og:site_name" content="플레이센스">
  <link rel="stylesheet" href="/css/style.css">
  <style>
    .n-wrap { max-width: 1100px; margin: 0 auto; padding: 20px 16px; min-height: calc(100vh - 60px - 140px); }

    .n-filter {
      background: #fff; border: 1px solid var(--border, #e5e7eb);
      border-radius: 16px; padding: 16px; margin-bottom: 20px;
    }
    .n-search {
      width: 100%; padding: 10px 14px;
      border: 1px solid var(--border, #e5e7eb); border-radius: 10px;
      font-size: 14px; outline: none; margin-bottom: 12px;
      box-sizing: border-box; background: #f8fafc; color: var(--text, #1e293b);
    }
    .n-search:focus { border-color: #c026d3; background: #fff; }
    .n-chips { display: flex; flex-wrap: wrap; gap: 6px; align-items: center; }
    .n-chip {
      display: inline-flex; align-items: center; gap: 4px;
      padding: 5px 14px; border-radius: 999px; font-size: 12px; font-weight: 700;
      border: 1.5px solid var(--border, #e5e7eb);
      background: transparent; color: var(--text-sub, #64748b);
      cursor: pointer; transition: all 0.15s;
    }
    .n-chip:hover { opacity: 0.8; }
    .n-chip.active { color: #fff; border-color: transparent; }

    .n-count { font-size: 13px; color: var(--text-sub, #64748b); margin-bottom: 14px; }
    .n-count strong { color: var(--text, #1e293b); }

    .n-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(100px, 1fr));
      gap: 10px;
    }

    .n-card {
      background: #fff; border: 1.5px solid var(--border, #e5e7eb);
      border-radius: 14px; overflow: hidden;
      cursor: default; transition: box-shadow 0.15s, transform 0.15s;
      display: flex; flex-direction: column; align-items: center;
    }
    .n-card:hover { box-shadow: 0 4px 16px rgba(0,0,0,0.1); transform: translateY(-2px); }

    .n-card-img-wrap {
      width: 100%; aspect-ratio: 1;
      background: #0f0f1a; position: relative; overflow: hidden;
    }
    .n-card-img-wrap img {
      width: 100%; height: 100%; object-fit: cover; object-position: top center;
    }
    .n-card-tier {
      position: absolute; top: 5px; left: 5px;
      font-size: 10px; font-weight: 800; padding: 2px 6px;
      border-radius: 5px; letter-spacing: 0.03em;
    }

    .n-card-body { padding: 6px 6px 8px; width: 100%; box-sizing: border-box; text-align: center; }
    .n-card-name {
      font-size: 12px; font-weight: 700; color: #1e293b;
      white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
    }

    /* 티어 색상 */
    .tier-SSS { background: #fef3c7; color: #78350f; }
    .tier-SS  { background: #fce7f3; color: #9d174d; }
    .tier-S   { background: #ede9fe; color: #5b21b6; }
    .tier-A   { background: #dbeafe; color: #1e40af; }
    .tier-B   { background: #dcfce7; color: #166534; }
    .tier-C   { background: #f1f5f9; color: #475569; }

    /* 카드 테두리 티어별 */
    .n-card.tier-border-SSS { border-color: #f59e0b; }
    .n-card.tier-border-SS  { border-color: #ec4899; }
    .n-card.tier-border-S   { border-color: #8b5cf6; }

    .n-empty { text-align: center; padding: 60px 16px; color: #94a3b8; font-size: 15px; }

    @media (max-width: 640px) {
      .n-grid { grid-template-columns: repeat(auto-fill, minmax(80px, 1fr)); gap: 8px; }
      .n-card-name { font-size: 11px; }
    }

    /* 모달 */
    .n-modal-overlay {
      display: none; position: fixed; inset: 0;
      background: rgba(0,0,0,0.55); z-index: 1000;
      align-items: center; justify-content: center; padding: 16px;
    }
    .n-modal-overlay.open { display: flex; }
    .n-modal {
      background: #fff; border-radius: 20px;
      width: 340px; max-width: 100%;
      box-shadow: 0 8px 40px rgba(0,0,0,0.25);
      overflow: hidden; position: relative;
    }
    .n-modal-img-wrap {
      width: 100%; aspect-ratio: 1;
      background: #0f0f1a; overflow: hidden;
    }
    .n-modal-img-wrap img { width: 100%; height: 100%; object-fit: cover; object-position: top; }
    .n-modal-body { padding: 18px 20px 22px; }
    .n-modal-name { font-size: 20px; font-weight: 800; color: #1e293b; margin-bottom: 2px; }
    .n-modal-en { font-size: 12px; color: #94a3b8; margin-bottom: 12px; }
    .n-modal-rarity { margin-bottom: 12px; }
    .n-modal-tags { display: flex; flex-wrap: wrap; gap: 6px; }
    .m-tag { font-size: 12px; font-weight: 700; padding: 4px 10px; border-radius: 999px; }
    .n-modal-close {
      position: absolute; top: 10px; right: 10px;
      width: 30px; height: 30px; border-radius: 50%;
      background: rgba(0,0,0,0.35); color: #fff;
      border: none; font-size: 16px; cursor: pointer;
      display: flex; align-items: center; justify-content: center;
    }
  </style>
</head>
<body>
<div id="navbar"></div>

<div class="n-wrap">
  <div style="display:flex;align-items:center;gap:12px;margin-bottom:20px;">
    <a href="/game/nikke/" style="font-size:13px;color:#64748b;text-decoration:none;">← 니케</a>
    <h1 style="font-size:20px;font-weight:800;margin:0;">캐릭터 도감</h1>
    <span id="total-badge" style="font-size:12px;color:#94a3b8;"></span>
  </div>

  <div class="n-filter">
    <input class="n-search" id="search" type="text" placeholder="캐릭터 이름 검색...">
    <div class="n-chips">
      <button class="n-chip active" data-tier="" style="--c:#c026d3;">전체</button>
      <button class="n-chip" data-tier="SSS" style="--c:#f59e0b;">SSS</button>
      <button class="n-chip" data-tier="SS"  style="--c:#ec4899;">SS</button>
      <button class="n-chip" data-tier="S"   style="--c:#8b5cf6;">S</button>
      <button class="n-chip" data-tier="A"   style="--c:#3b82f6;">A</button>
      <button class="n-chip" data-tier="B"   style="--c:#22c55e;">B</button>
      <button class="n-chip" data-tier="C"   style="--c:#94a3b8;">C</button>
    </div>
  </div>

  <div class="n-count" id="count"></div>
  <div class="n-grid" id="grid"><div class="n-empty">불러오는 중...</div></div>
</div>

<!-- 상세 모달 -->
<div class="n-modal-overlay" id="n-modal" onclick="if(event.target===this)closeModal()">
  <div class="n-modal">
    <button class="n-modal-close" onclick="closeModal()">✕</button>
    <div class="n-modal-img-wrap">
      <img id="m-img" src="" alt="">
    </div>
    <div class="n-modal-body">
      <div class="n-modal-name" id="m-name"></div>
      <div class="n-modal-en" id="m-en"></div>
      <div class="n-modal-rarity" id="m-rarity"></div>
      <div class="n-modal-tags" id="m-tags"></div>
    </div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="/js/config.js"></script>
<script>
  const TIER_ORDER = ['SSS','SS','S','A','B','C']
  let allChars = []
  let activeTier = ''

  async function init() {
    document.getElementById('navbar').innerHTML = renderNavbar()
    loadAndRenderGameUI(null)

    const { data: game } = await db.from('Game').select('id').eq('slug', 'nikke').single()
    if (!game) return

    const { data: chars } = await db
      .from('Character')
      .select('id, nameKo, nameEn, tier, imageUrl, rarity, manufacturer, weaponType, element, classType, burstType')
      .eq('gameId', game.id)
      .eq('isActive', true)
      .order('tier')
      .order('nameKo')

    allChars = (chars ?? []).sort((a, b) => {
      const ta = TIER_ORDER.indexOf(a.tier)
      const tb = TIER_ORDER.indexOf(b.tier)
      if (ta !== tb) return ta - tb
      return a.nameKo.localeCompare(b.nameKo, 'ko')
    })

    document.getElementById('total-badge').textContent = `총 ${allChars.length}명`
    render()
  }

  function render() {
    const q = document.getElementById('search').value.trim().toLowerCase()
    const list = allChars.filter(c => {
      if (activeTier && c.tier !== activeTier) return false
      if (q && !c.nameKo.toLowerCase().includes(q)) return false
      return true
    })

    document.getElementById('count').innerHTML = `<strong>${list.length}명</strong> 표시 중`
    const grid = document.getElementById('grid')

    if (list.length === 0) {
      grid.innerHTML = '<div class="n-empty">조건에 맞는 캐릭터가 없어요</div>'
      return
    }

    grid.innerHTML = list.map(c => {
      const borderClass = ['SSS','SS','S'].includes(c.tier) ? `tier-border-${c.tier}` : ''
      return `
        <a class="n-card ${borderClass}" href="/game/nikke/characters/${c.slug}/" style="text-decoration:none;">
          <div class="n-card-img-wrap">
            ${c.imageUrl
              ? `<img src="${c.imageUrl}" alt="${c.nameKo}" loading="lazy" onerror="this.parentElement.style.background='#1e1e2e'">`
              : ''
            }
            <span class="n-card-tier tier-${c.tier}">${c.tier}</span>
          </div>
          <div class="n-card-body">
            <div class="n-card-name">${c.nameKo}</div>
          </div>
        </a>`
    }).join('')
  }

  const MANU_KO   = { Elysion:'엘리시온', Missilis:'미실리스', Tetra:'테트라', Pilgrim:'필그림', Abnormal:'애브노멀' }
  const WEAPON_KO = { 'Assault Rifle':'돌격소총', 'Sniper Rifle':'저격소총', 'Rocket Launcher':'로켓런처', SMG:'기관단총', Shotgun:'산탄총', Minigun:'미니건' }
  const ELEM_KO   = { Fire:'화염', Water:'수력', Wind:'풍력', Electric:'전력', Iron:'철력' }
  const CLASS_KO  = { Attacker:'공격', Defender:'방어', Supporter:'지원' }
  const ELEM_COLOR = { Fire:'#ef4444', Water:'#3b82f6', Wind:'#22c55e', Electric:'#f59e0b', Iron:'#94a3b8' }
  const CLASS_COLOR = { Attacker:'#ef4444', Defender:'#3b82f6', Supporter:'#a855f7' }

  function openModal(id) {
    const c = allChars.find(c => c.id === id)
    if (!c) return
    const m = document.getElementById('n-modal')
    m.querySelector('#m-img').src = c.imageUrl || ''
    m.querySelector('#m-img').alt = c.nameKo
    m.querySelector('#m-name').textContent = c.nameKo
    m.querySelector('#m-en').textContent = c.nameEn || ''
    m.querySelector('#m-rarity').textContent = c.rarity || c.tier
    m.querySelector('#m-rarity').className = `n-card-tier tier-${c.tier}`

    const tags = [
      c.manufacturer ? `<span class="m-tag" style="background:#f1f5f9;color:#374151;">${MANU_KO[c.manufacturer]||c.manufacturer}</span>` : '',
      c.element ? `<span class="m-tag" style="background:${ELEM_COLOR[c.element]}22;color:${ELEM_COLOR[c.element]};">${ELEM_KO[c.element]||c.element}</span>` : '',
      c.classType ? `<span class="m-tag" style="background:${CLASS_COLOR[c.classType]}22;color:${CLASS_COLOR[c.classType]};">${CLASS_KO[c.classType]||c.classType}</span>` : '',
      c.burstType ? `<span class="m-tag" style="background:#ede9fe;color:#5b21b6;">버스트 ${c.burstType}</span>` : '',
      c.weaponType ? `<span class="m-tag" style="background:#f0fdf4;color:#166534;">${WEAPON_KO[c.weaponType]||c.weaponType}</span>` : '',
    ].filter(Boolean).join('')
    m.querySelector('#m-tags').innerHTML = tags

    m.classList.add('open')
    document.body.style.overflow = 'hidden'
  }

  function closeModal() {
    document.getElementById('n-modal').classList.remove('open')
    document.body.style.overflow = ''
  }

  // 칩 클릭
  document.querySelectorAll('.n-chip').forEach(btn => {
    const color = btn.style.getPropertyValue('--c') || '#c026d3'
    if (btn.classList.contains('active')) {
      btn.style.background = color
      btn.style.borderColor = color
      btn.style.color = '#fff'
    }
    btn.addEventListener('click', () => {
      activeTier = btn.dataset.tier
      document.querySelectorAll('.n-chip').forEach(b => {
        b.classList.remove('active')
        b.style.background = ''
        b.style.borderColor = ''
        b.style.color = ''
      })
      btn.classList.add('active')
      btn.style.background = color
      btn.style.borderColor = color
      btn.style.color = '#fff'
      render()
    })
  })

  document.getElementById('search').addEventListener('input', render)

  init()
</script>

<div id="footer"></div>
</body>
</html>
