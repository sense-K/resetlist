<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <link rel="icon" type="image/svg+xml" href="/favicon.svg">
  <link rel="shortcut icon" href="/favicon.svg">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>로그인 | 리세 리스트</title>
  <link rel="stylesheet" href="/css/style.css">
  <style>
    .auth-wrap {
      max-width: 400px;
      margin: 60px auto;
      padding: 0 20px;
    }
    .auth-logo {
      font-size: 26px;
      font-weight: 900;
      text-align: center;
      margin-bottom: 32px;
    }
    .auth-card {
      background: #fff;
      border-radius: 16px;
      padding: 32px;
      box-shadow: 0 2px 20px rgba(0,0,0,0.08);
    }
    .auth-tabs {
      display: flex;
      border-bottom: 2px solid var(--border);
      margin-bottom: 28px;
    }
    .auth-tab {
      flex: 1;
      padding: 10px;
      text-align: center;
      font-size: 15px;
      font-weight: 700;
      color: #aaa;
      cursor: pointer;
      border-bottom: 2px solid transparent;
      margin-bottom: -2px;
      transition: all 0.15s;
    }
    .auth-tab.active { color: #111; border-bottom-color: #111; }
    .auth-panel { display: none; }
    .auth-panel.active { display: block; }
    .auth-error {
      background: #fef2f2;
      color: #dc2626;
      border-radius: 8px;
      padding: 10px 14px;
      font-size: 13px;
      margin-bottom: 16px;
      display: none;
    }
    .auth-success {
      background: #f0fdf4;
      color: #16a34a;
      border-radius: 8px;
      padding: 10px 14px;
      font-size: 13px;
      margin-bottom: 16px;
      display: none;
    }
    .auth-divider {
      text-align: center;
      color: #aaa;
      font-size: 12px;
      margin: 20px 0;
      position: relative;
    }
    .auth-divider::before, .auth-divider::after {
      content: '';
      position: absolute;
      top: 50%;
      width: 40%;
      height: 1px;
      background: var(--border);
    }
    .auth-divider::before { left: 0; }
    .auth-divider::after { right: 0; }
    .btn-google {
      width: 100%;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      padding: 12px;
      border: 1.5px solid var(--border);
      border-radius: 8px;
      background: #fff;
      font-size: 14px;
      font-weight: 600;
      color: #333;
      cursor: pointer;
      transition: background 0.15s, border-color 0.15s;
      font-family: inherit;
    }
    .btn-google:hover { background: #f8f8f8; border-color: #ccc; }
    .btn-google img { width: 20px; height: 20px; }
    .forgot-link {
      text-align: right;
      margin-top: 8px;
    }
    .forgot-link a {
      font-size: 13px;
      color: #888;
      cursor: pointer;
      text-decoration: underline;
    }
    .forgot-link a:hover { color: #111; }
    .back-link {
      text-align: center;
      margin-top: 16px;
    }
    .back-link a {
      font-size: 13px;
      color: #888;
      cursor: pointer;
      text-decoration: underline;
    }
  </style>
</head>
<body>
<div id="navbar"></div>

<div class="auth-wrap">
  <div class="auth-logo">리세 리스트</div>

  <div class="auth-card">
    <div class="auth-tabs" id="auth-tabs">
      <div class="auth-tab active" onclick="switchTab('login')">로그인</div>
      <div class="auth-tab" onclick="switchTab('signup')">회원가입</div>
    </div>

    <!-- 구글 로그인 -->
    <button class="btn-google" onclick="loginWithGoogle()">
      <img src="https://www.gstatic.com/firebasejs/ui/2.0.0/images/auth/google.svg" alt="Google">
      Google로 계속하기
    </button>

    <div class="auth-divider">또는 이메일로</div>

    <!-- 로그인 -->
    <div class="auth-panel active" id="panel-login">
      <div class="auth-error" id="login-error"></div>
      <div class="form-group">
        <label class="form-label">이메일</label>
        <input type="email" class="form-input" id="login-email" placeholder="example@email.com">
      </div>
      <div class="form-group">
        <label class="form-label">비밀번호</label>
        <input type="password" class="form-input" id="login-pw" placeholder="비밀번호 입력" onkeydown="if(event.key==='Enter')login()">
      </div>
      <button class="btn btn-primary btn-full" onclick="login()" id="login-btn">로그인</button>
      <div class="forgot-link"><a onclick="switchTab('forgot')">비밀번호를 잊으셨나요?</a></div>
    </div>

    <!-- 회원가입 -->
    <div class="auth-panel" id="panel-signup">
      <div class="auth-error" id="signup-error"></div>
      <div class="auth-success" id="signup-success"></div>
      <div class="form-group">
        <label class="form-label">닉네임 <span style="color:red">*</span></label>
        <input type="text" class="form-input" id="signup-nickname" placeholder="활동할 닉네임">
      </div>
      <div class="form-group">
        <label class="form-label">이메일 <span style="color:red">*</span></label>
        <input type="email" class="form-input" id="signup-email" placeholder="example@email.com">
      </div>
      <div class="form-group">
        <label class="form-label">비밀번호 <span style="color:red">*</span></label>
        <input type="password" class="form-input" id="signup-pw" placeholder="6자 이상">
      </div>
      <div class="form-group">
        <label class="form-label">비밀번호 확인 <span style="color:red">*</span></label>
        <input type="password" class="form-input" id="signup-pw-confirm" placeholder="비밀번호 재입력">
      </div>
      <button class="btn btn-primary btn-full" onclick="signup()" id="signup-btn">회원가입</button>
    </div>

    <!-- 비밀번호 재설정 링크 발송 -->
    <div class="auth-panel" id="panel-forgot">
      <div style="font-size:15px;font-weight:700;margin-bottom:6px;">비밀번호 재설정</div>
      <div style="font-size:13px;color:#888;margin-bottom:20px;">가입한 이메일로 재설정 링크를 보내드려요</div>
      <div class="auth-error" id="forgot-error"></div>
      <div class="auth-success" id="forgot-success"></div>
      <div class="form-group">
        <label class="form-label">이메일</label>
        <input type="email" class="form-input" id="forgot-email" placeholder="가입한 이메일 주소" onkeydown="if(event.key==='Enter')sendResetEmail()">
      </div>
      <button class="btn btn-primary btn-full" onclick="sendResetEmail()" id="forgot-btn">재설정 링크 보내기</button>
      <div class="back-link"><a onclick="switchTab('login')">← 로그인으로 돌아가기</a></div>
    </div>

    <!-- 새 비밀번호 입력 (재설정 링크 클릭 후) -->
    <div class="auth-panel" id="panel-reset">
      <div style="font-size:15px;font-weight:700;margin-bottom:6px;">새 비밀번호 설정</div>
      <div style="font-size:13px;color:#888;margin-bottom:20px;">사용할 새 비밀번호를 입력해주세요</div>
      <div class="auth-error" id="reset-error"></div>
      <div class="auth-success" id="reset-success"></div>
      <div class="form-group">
        <label class="form-label">새 비밀번호</label>
        <input type="password" class="form-input" id="reset-pw" placeholder="6자 이상">
      </div>
      <div class="form-group">
        <label class="form-label">비밀번호 확인</label>
        <input type="password" class="form-input" id="reset-pw-confirm" placeholder="비밀번호 재입력" onkeydown="if(event.key==='Enter')updatePassword()">
      </div>
      <button class="btn btn-primary btn-full" onclick="updatePassword()" id="reset-btn">비밀번호 변경</button>
    </div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="/js/config.js"></script>
<script>
  document.getElementById('navbar').innerHTML = renderNavbar()
  loadAndRenderGameUI(null)

  // 비밀번호 재설정 링크로 돌아온 경우 감지
  db.auth.onAuthStateChange((event) => {
    if (event === 'PASSWORD_RECOVERY') {
      switchTab('reset')
    }
  })

  // 이미 로그인된 경우 홈으로 (재설정 모드 제외)
  db.auth.getSession().then(({ data: { session } }) => {
    if (session && event !== 'PASSWORD_RECOVERY') {
      const hash = location.hash
      if (!hash.includes('type=recovery')) {
        window.location.href = (new URLSearchParams(location.search).get('next') || '/')
      }
    }
  })

  function switchTab(tab) {
    const isForgotOrReset = tab === 'forgot' || tab === 'reset'
    // 탭 UI: forgot/reset일 땐 숨김
    document.getElementById('auth-tabs').style.display = isForgotOrReset ? 'none' : ''
    // 구글 로그인 버튼과 구분선도 forgot/reset일 땐 숨김
    document.querySelector('.btn-google').style.display = isForgotOrReset ? 'none' : ''
    document.querySelector('.auth-divider').style.display = isForgotOrReset ? 'none' : ''
    // 패널 전환
    ;['login','signup','forgot','reset'].forEach(p => {
      document.getElementById('panel-' + p).classList.toggle('active', p === tab)
    })
  }

  async function login() {
    const email = document.getElementById('login-email').value.trim()
    const pw = document.getElementById('login-pw').value
    const errEl = document.getElementById('login-error')
    const btn = document.getElementById('login-btn')

    if (!email || !pw) { showErr(errEl, '이메일과 비밀번호를 입력해주세요'); return }

    btn.disabled = true; btn.textContent = '로그인 중...'
    errEl.style.display = 'none'

    const { error } = await db.auth.signInWithPassword({ email, password: pw })

    if (error) {
      showErr(errEl, '이메일 또는 비밀번호가 틀렸어요')
      btn.disabled = false; btn.textContent = '로그인'
    } else {
      window.location.href = new URLSearchParams(location.search).get('next') || '/'
    }
  }

  async function signup() {
    const nickname = document.getElementById('signup-nickname').value.trim()
    const email = document.getElementById('signup-email').value.trim()
    const pw = document.getElementById('signup-pw').value
    const errEl = document.getElementById('signup-error')
    const sucEl = document.getElementById('signup-success')
    const btn = document.getElementById('signup-btn')

    if (!nickname) { showErr(errEl, '닉네임을 입력해주세요'); return }
    if (!email) { showErr(errEl, '이메일을 입력해주세요'); return }
    if (pw.length < 6) { showErr(errEl, '비밀번호는 6자 이상이어야 해요'); return }
    const pwConfirm = document.getElementById('signup-pw-confirm').value
    if (pw !== pwConfirm) { showErr(errEl, '비밀번호가 일치하지 않아요'); return }

    btn.disabled = true; btn.textContent = '가입 중...'
    errEl.style.display = 'none'; sucEl.style.display = 'none'

    const { data, error } = await db.auth.signUp({ email, password: pw })

    if (error) {
      showErr(errEl, error.message.includes('already') ? '이미 사용중인 이메일이에요' : '회원가입에 실패했어요')
      btn.disabled = false; btn.textContent = '회원가입'
      return
    }

    // User 테이블에 프로필 저장
    if (data.user) {
      const now = new Date().toISOString()
      const { error: userErr } = await db.from('User').insert({
        id: data.user.id,
        nickname,
        isPhoneVerified: false,
        createdAt: now
      })
      if (userErr) console.error('User insert error:', userErr)
    }

    sucEl.textContent = '가입 완료! 로그인해주세요.'
    sucEl.style.display = 'block'
    btn.disabled = false; btn.textContent = '회원가입'

    // 이메일 인증 없이 바로 로그인 가능한 경우 자동 이동
    if (data.session) {
      window.location.href = new URLSearchParams(location.search).get('next') || '/'
    } else {
      sucEl.textContent = '가입 완료! 이메일을 확인한 뒤 로그인해주세요.'
    }
  }

  async function loginWithGoogle() {
    const next = new URLSearchParams(location.search).get('next') || '/'
    const { error } = await db.auth.signInWithOAuth({
      provider: 'google',
      options: { redirectTo: location.origin + next }
    })
    if (error) alert('구글 로그인 실패: ' + error.message)
  }

  async function sendResetEmail() {
    const email = document.getElementById('forgot-email').value.trim()
    const errEl = document.getElementById('forgot-error')
    const sucEl = document.getElementById('forgot-success')
    const btn = document.getElementById('forgot-btn')
    if (!email) { showErr(errEl, '이메일을 입력해주세요'); return }
    btn.disabled = true; btn.textContent = '발송 중...'
    errEl.style.display = 'none'; sucEl.style.display = 'none'
    const { error } = await db.auth.resetPasswordForEmail(email, {
      redirectTo: 'https://resetlist.kr/auth/'
    })
    if (error) {
      showErr(errEl, '발송에 실패했어요. 이메일을 확인해주세요')
      btn.disabled = false; btn.textContent = '재설정 링크 보내기'
    } else {
      sucEl.textContent = '이메일을 보냈어요! 받은 편지함을 확인해주세요'
      sucEl.style.display = 'block'
      btn.disabled = false; btn.textContent = '재설정 링크 보내기'
    }
  }

  async function updatePassword() {
    const pw = document.getElementById('reset-pw').value
    const pwConfirm = document.getElementById('reset-pw-confirm').value
    const errEl = document.getElementById('reset-error')
    const sucEl = document.getElementById('reset-success')
    const btn = document.getElementById('reset-btn')
    errEl.style.display = 'none'; sucEl.style.display = 'none'
    if (pw.length < 6) { showErr(errEl, '비밀번호는 6자 이상이어야 해요'); return }
    if (pw !== pwConfirm) { showErr(errEl, '비밀번호가 일치하지 않아요'); return }
    btn.disabled = true; btn.textContent = '변경 중...'
    const { error } = await db.auth.updateUser({ password: pw })
    if (error) {
      showErr(errEl, '변경에 실패했어요. 링크가 만료됐을 수 있어요')
      btn.disabled = false; btn.textContent = '비밀번호 변경'
    } else {
      sucEl.textContent = '비밀번호가 변경됐어요! 잠시 후 홈으로 이동해요'
      sucEl.style.display = 'block'
      btn.disabled = true
      setTimeout(() => window.location.href = '/', 2000)
    }
  }

  function showErr(el, msg) {
    el.textContent = msg
    el.style.display = 'block'
  }
</script>
<div id="footer"></div>
</body>
</html>
