<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>판매글 등록 | 리스트업</title>
  <link rel="stylesheet" href="/css/style.css">
  <style>
    .step-indicator {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      padding: 24px 0 16px;
    }
    .step {
      width: 30px; height: 30px;
      border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      font-size: 13px; font-weight: 700;
      background: var(--border); color: var(--text-muted);
      transition: all 0.3s;
    }
    .step.active { background: #111; color: #fff; }
    .step.done { background: #10b981; color: #fff; }
    .step-line { flex: 1; max-width: 48px; height: 2px; background: var(--border); }

    .step-panel { display: none; }
    .step-panel.active { display: block; }

    /* 캐릭터 티어 필터 탭 */
    .tier-tabs {
      display: flex;
      gap: 6px;
      margin-bottom: 14px;
    }
    .tier-tab {
      padding: 6px 14px;
      border-radius: 999px;
      border: 1.5px solid var(--border);
      background: #fff;
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.15s;
      color: var(--text-muted);
    }
    .tier-tab.active { background: #111; color: #fff; border-color: #111; }
    .tier-tab.s { }
    .tier-tab.s.active { background: #f59e0b; border-color: #f59e0b; }
    .tier-tab.a.active { background: #6366f1; border-color: #6366f1; }

    /* 캐릭터 그리드 */
    .char-grid {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 10px;
      max-height: 380px;
      overflow-y: auto;
      padding-right: 2px;
    }
    .char-grid::-webkit-scrollbar { width: 4px; }
    .char-grid::-webkit-scrollbar-track { background: transparent; }
    .char-grid::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; }

    /* 게임 선택 카드 */
    .game-select-grid {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 10px;
      margin-bottom: 20px;
    }
    .game-select-card {
      display: flex;
      align-items: center;
      gap: 12px;
      border: 2px solid var(--border);
      border-radius: 12px;
      padding: 14px 16px;
      cursor: pointer;
      transition: all 0.15s;
      background: #fff;
    }
    .game-select-card:hover { border-color: #aaa; }
    .game-select-card.selected { border-color: #111; background: #f8f8f8; }
    .game-select-card .game-icon-wrap {
      width: 40px; height: 40px; flex-shrink: 0;
    }
    .game-select-card .game-icon-wrap img {
      width: 40px; height: 40px; border-radius: 10px; object-fit: cover;
    }
    .game-select-card .game-emoji {
      font-size: 28px; width: 40px; height: 40px;
      display: flex; align-items: center; justify-content: center;
    }
    .game-select-card .game-name { font-size: 14px; font-weight: 700; }

    .char-item {
      position: relative;
      border: 2px solid var(--border);
      border-radius: 12px;
      overflow: hidden;
      cursor: pointer;
      transition: all 0.15s;
      aspect-ratio: 3/4;
      background: #f3f4f6;
    }
    .char-item:hover { border-color: #aaa; transform: translateY(-1px); }
    .char-item.selected {
      border-color: #111;
      box-shadow: 0 0 0 1px #111;
    }
    .char-item img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
    }
    .char-item .char-no-img {
      width: 100%;
      height: 100%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 28px;
      color: #ccc;
    }
    .char-item .char-tier-badge {
      position: absolute;
      top: 6px; left: 6px;
      font-size: 10px;
      font-weight: 800;
      padding: 2px 6px;
      border-radius: 4px;
      line-height: 1.4;
    }
    .char-item .char-tier-badge.s { background: #f59e0b; color: #fff; }
    .char-item .char-tier-badge.a { background: #6366f1; color: #fff; }
    .char-item .char-tier-badge.b { background: #6b7280; color: #fff; }
    .char-item .char-name-label {
      position: absolute;
      bottom: 0; left: 0; right: 0;
      background: linear-gradient(to top, rgba(0,0,0,0.75) 0%, transparent 100%);
      color: #fff;
      font-size: 11px;
      font-weight: 600;
      padding: 16px 6px 6px;
      text-align: center;
    }
    .char-item .check-overlay {
      display: none;
      position: absolute;
      inset: 0;
      background: rgba(0,0,0,0.45);
      align-items: center;
      justify-content: center;
    }
    .char-item.selected .check-overlay {
      display: flex;
    }
    .check-overlay svg {
      width: 28px; height: 28px;
      filter: drop-shadow(0 1px 3px rgba(0,0,0,0.5));
    }

    /* 선택된 캐릭터 표시 */
    .selected-chars-bar {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
      min-height: 40px;
      padding: 10px 12px;
      border: 1.5px dashed var(--border);
      border-radius: 10px;
      margin-bottom: 14px;
      align-items: center;
    }
    .selected-char-tag {
      display: flex;
      align-items: center;
      gap: 4px;
      background: #111;
      color: #fff;
      border-radius: 999px;
      padding: 4px 10px 4px 8px;
      font-size: 12px;
      font-weight: 600;
    }
    .selected-char-tag img {
      width: 20px; height: 20px;
      border-radius: 50%;
      object-fit: cover;
    }
    .selected-char-tag button {
      background: none; border: none; color: rgba(255,255,255,0.7); cursor: pointer;
      font-size: 14px; line-height: 1; padding: 0; margin-left: 2px;
    }
    .selected-char-tag button:hover { color: #fff; }

    .price-input-wrap { position: relative; }
    .price-input-wrap input { padding-right: 40px; }
    .price-unit { position: absolute; right: 14px; top: 50%; transform: translateY(-50%); color: var(--text-muted); font-size: 14px; }

    .summary-box {
      background: #f8f8f8;
      border: 1.5px solid var(--border);
      border-radius: 12px;
      padding: 16px;
      margin-bottom: 20px;
    }
    .summary-row { display: flex; justify-content: space-between; font-size: 14px; margin-bottom: 8px; }
    .summary-row:last-child { margin-bottom: 0; }
    .summary-row strong { font-weight: 600; }
  </style>
</head>
<body>

<div id="navbar"></div>

<div style="max-width:560px;margin:0 auto;padding:0 20px 60px;">
  <div class="step-indicator">
    <div class="step active" id="step-dot-1">1</div>
    <div class="step-line"></div>
    <div class="step" id="step-dot-2">2</div>
    <div class="step-line"></div>
    <div class="step" id="step-dot-3">3</div>
  </div>

  <!-- STEP 1: 게임/서버 선택 -->
  <div class="step-panel active" id="panel-1">
    <div class="section-title" style="margin-bottom:20px;">게임과 서버를 선택하세요</div>
    <div class="form-group">
      <label class="form-label">게임</label>
      <div class="game-select-grid" id="game-select-grid">
        <div style="color:var(--text-muted);font-size:13px;grid-column:1/-1;">불러오는 중...</div>
      </div>
    </div>
    <div class="form-group" id="server-group" style="display:none;">
      <label class="form-label">서버</label>
      <select class="form-select" id="server-select">
        <option value="">서버 선택</option>
      </select>
    </div>
    <button class="btn btn-primary btn-full" onclick="goStep(2)">다음 →</button>
  </div>

  <!-- STEP 2: 캐릭터 선택 -->
  <div class="step-panel" id="panel-2">
    <div class="section-title" style="margin-bottom:12px;">보유 캐릭터를 선택하세요</div>

    <div class="selected-chars-bar" id="selected-chars">
      <span style="color:var(--text-muted);font-size:13px;" id="selected-placeholder">캐릭터를 선택하면 여기 표시돼요</span>
    </div>

    <div class="tier-tabs" id="tier-tabs">
      <button class="tier-tab active" onclick="filterTier('all', this)">전체</button>
      <button class="tier-tab s" onclick="filterTier('S', this)">S티어</button>
      <button class="tier-tab a" onclick="filterTier('A', this)">A티어</button>
      <button class="tier-tab" onclick="filterTier('B', this)">B티어</button>
    </div>

    <div class="char-grid" id="char-grid">
      <div class="loading" style="grid-column:1/-1;">불러오는 중...</div>
    </div>

    <div style="display:flex;gap:8px;margin-top:16px;">
      <button class="btn btn-outline" onclick="goStep(1)" style="flex:1;">← 이전</button>
      <button class="btn btn-primary" onclick="goStep(3)" style="flex:2;">다음 →</button>
    </div>
  </div>

  <!-- STEP 3: 가격/연락처 -->
  <div class="step-panel" id="panel-3">
    <div class="section-title" style="margin-bottom:20px;">가격과 연락처를 입력하세요</div>

    <div class="summary-box" id="summary-box"></div>

    <div class="form-group">
      <label class="form-label">판매가격 <span style="color:red">*</span></label>
      <div class="price-input-wrap">
        <input type="number" class="form-input" id="price-input" placeholder="50000" min="0">
        <span class="price-unit">원</span>
      </div>
    </div>
    <div class="form-group">
      <label class="form-label">할인금액 <span style="color:var(--text-muted);font-size:12px;">(선택)</span></label>
      <div class="price-input-wrap">
        <input type="number" class="form-input" id="discount-input" placeholder="5000" min="0">
        <span class="price-unit">원</span>
      </div>
    </div>
    <div class="form-group">
      <label class="form-label">계정 설명 <span style="color:var(--text-muted);font-size:12px;">(선택)</span></label>
      <textarea class="form-textarea" id="desc-input" placeholder="계정 상태, 보유 재화 등 자유롭게 적어주세요"></textarea>
    </div>
    <div class="form-group">
      <label class="form-label">연락처 <span style="color:red">*</span></label>
      <input type="text" class="form-input" id="contact-input" placeholder="카카오톡 ID, 오픈채팅 링크 등">
    </div>

    <div style="display:flex;gap:8px;">
      <button class="btn btn-outline" onclick="goStep(2)" style="flex:1;">← 이전</button>
      <button class="btn btn-primary" onclick="submitListing()" style="flex:2;" id="submit-btn">판매글 등록</button>
    </div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="/js/config.js"></script>
<script>
  document.getElementById('navbar').innerHTML = renderNavbar('sell')

  let selectedGameId = null
  let selectedServerId = null
  let selectedChars = []
  let allChars = []
  let currentTierFilter = 'all'

  async function init() {
    const { data: games } = await db.from('Game').select('id, nameKo, slug, emoji, imageUrl').eq('isActive', true).order('sortOrder', { nullsFirst: false }).order('nameKo')
    const grid = document.getElementById('game-select-grid')
    if (!games || games.length === 0) {
      grid.innerHTML = '<div style="color:var(--text-muted);font-size:13px;">게임이 없어요</div>'
      return
    }
    grid.innerHTML = games.map(g => `
      <div class="game-select-card" id="gcard-${g.id}" onclick="selectGame(${JSON.stringify(g).replace(/"/g, '&quot;')})">
        <div class="game-icon-wrap">
          ${g.imageUrl
            ? `<img src="${g.imageUrl}" alt="${g.nameKo}">`
            : `<div class="game-emoji">${g.emoji ?? ''}</div>`
          }
        </div>
        <span class="game-name">${g.nameKo}</span>
      </div>
    `).join('')
  }

  async function selectGame(g) {
    selectedGameId = g.id
    selectedChars = []
    allChars = []

    // 카드 선택 표시
    document.querySelectorAll('.game-select-card').forEach(el => el.classList.remove('selected'))
    document.getElementById('gcard-' + g.id)?.classList.add('selected')

    // 서버 로드
    const serverSel = document.getElementById('server-select')
    serverSel.innerHTML = '<option value="">서버 선택</option>'
    const { data: servers } = await db.from('Server').select('id, nameKo').eq('gameId', g.id)
    servers?.forEach(s => {
      const opt = document.createElement('option')
      opt.value = s.id; opt.textContent = s.nameKo; serverSel.appendChild(opt)
    })
    serverSel.onchange = () => { selectedServerId = serverSel.value }

    document.getElementById('server-group').style.display = 'block'
  }

  async function loadChars() {
    if (!selectedGameId) return
    const { data: chars } = await db
      .from('Character')
      .select('id, nameKo, tier, imageUrl')
      .eq('gameId', selectedGameId)
      .eq('isActive', true)
      .order('tier')
    allChars = chars ?? []
    currentTierFilter = 'all'
    document.querySelectorAll('.tier-tab').forEach(t => t.classList.remove('active'))
    document.querySelector('.tier-tab').classList.add('active')
    renderCharGrid()
  }

  function filterTier(tier, btn) {
    currentTierFilter = tier
    document.querySelectorAll('.tier-tab').forEach(t => t.classList.remove('active'))
    btn.classList.add('active')
    renderCharGrid()
  }

  function renderCharGrid() {
    const filtered = currentTierFilter === 'all'
      ? allChars
      : allChars.filter(c => c.tier === currentTierFilter)

    const grid = document.getElementById('char-grid')
    if (!filtered.length) {
      grid.innerHTML = '<div style="grid-column:1/-1;text-align:center;padding:24px;color:var(--text-muted);">캐릭터가 없어요</div>'
      return
    }

    grid.innerHTML = filtered.map(c => {
      const tierClass = (c.tier || '').toLowerCase()
      const isSelected = selectedChars.some(x => x.id === c.id)
      return `
        <div class="char-item${isSelected ? ' selected' : ''}" id="char-${c.id}" onclick="toggleChar(${JSON.stringify(c).replace(/"/g, '&quot;')})">
          ${c.imageUrl
            ? `<img src="${c.imageUrl}" alt="${c.nameKo}" loading="lazy">`
            : `<div class="char-no-img">?</div>`
          }
          <span class="char-tier-badge ${tierClass}">${c.tier}</span>
          <div class="char-name-label">${c.nameKo}</div>
          <div class="check-overlay">
            <svg viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="3" stroke-linecap="round" stroke-linejoin="round">
              <polyline points="20 6 9 17 4 12"/>
            </svg>
          </div>
        </div>
      `
    }).join('')
  }

  function toggleChar(c) {
    const idx = selectedChars.findIndex(x => x.id === c.id)
    if (idx >= 0) {
      selectedChars.splice(idx, 1)
    } else {
      selectedChars.push(c)
    }
    // DOM 업데이트 (그리드 전체 재렌더 없이)
    const el = document.getElementById('char-' + c.id)
    if (el) el.classList.toggle('selected', selectedChars.some(x => x.id === c.id))
    renderSelectedChars()
  }

  function renderSelectedChars() {
    const el = document.getElementById('selected-chars')
    const placeholder = document.getElementById('selected-placeholder')

    if (selectedChars.length === 0) {
      el.innerHTML = '<span style="color:var(--text-muted);font-size:13px;" id="selected-placeholder">캐릭터를 선택하면 여기 표시돼요</span>'
      return
    }

    el.innerHTML = selectedChars.map(c => `
      <span class="selected-char-tag">
        ${c.imageUrl ? `<img src="${c.imageUrl}" alt="${c.nameKo}">` : ''}
        ${c.nameKo}
        <button onclick="event.stopPropagation();toggleChar(${JSON.stringify(c).replace(/"/g, '&quot;')})">×</button>
      </span>
    `).join('')
  }

  function goStep(n) {
    if (n === 2) {
      if (!selectedGameId) { alert('게임을 선택해주세요'); return }
      const serverVal = document.getElementById('server-select').value
      if (!serverVal) { alert('서버를 선택해주세요'); return }
      selectedServerId = serverVal
      loadChars()
    }
    if (n === 3) {
      renderSummary()
    }
    document.querySelectorAll('.step-panel').forEach((p, i) => {
      p.classList.toggle('active', i + 1 === n)
    })
    document.querySelectorAll('.step').forEach((s, i) => {
      s.classList.remove('active', 'done')
      if (i + 1 < n) s.classList.add('done')
      else if (i + 1 === n) s.classList.add('active')
    })
  }

  function renderSummary() {
    const selectedCard = document.querySelector('.game-select-card.selected .game-name')
    const gameText = selectedCard?.textContent ?? ''
    const serverSel = document.getElementById('server-select')
    const serverText = serverSel.options[serverSel.selectedIndex]?.text ?? ''
    document.getElementById('summary-box').innerHTML = `
      <div class="summary-row"><span>게임</span><strong>${gameText}</strong></div>
      <div class="summary-row"><span>서버</span><strong>${serverText}</strong></div>
      <div class="summary-row"><span>캐릭터</span><strong>${selectedChars.length > 0 ? selectedChars.map(c => c.nameKo).join(', ') : '선택 안 함'}</strong></div>
    `
  }

  async function submitListing() {
    const price = Number(document.getElementById('price-input').value)
    const contact = document.getElementById('contact-input').value.trim()
    if (!price || price <= 0) { alert('판매가격을 입력해주세요'); return }
    if (!contact) { alert('연락처를 입력해주세요'); return }

    const btn = document.getElementById('submit-btn')
    btn.disabled = true; btn.textContent = '등록 중...'

    try {
      let { data: user } = await db.from('User').select('id').limit(1).single()
      if (!user) {
        const { data: newUser } = await db
          .from('User')
          .insert({ nickname: '익명', isPhoneVerified: false, createdAt: new Date().toISOString() })
          .select().single()
        user = newUser
      }

      const { data: listing, error } = await db.from('Listing').insert({
        userId: user.id,
        gameId: selectedGameId,
        serverId: selectedServerId,
        price,
        discountAmount: Number(document.getElementById('discount-input').value) || null,
        description: document.getElementById('desc-input').value || null,
        contactInfo: contact,
        status: 'active',
        viewCount: 0,
        createdAt: new Date().toISOString(),
        updatedAt: new Date().toISOString(),
      }).select().single()

      if (error) throw error

      if (selectedChars.length > 0) {
        await db.from('ListingCharacter').insert(
          selectedChars.map(c => ({ listingId: listing.id, characterId: c.id }))
        )
      }

      alert('판매글이 등록됐어요!')
      window.location.href = '/'
    } catch (e) {
      console.error(e)
      alert('등록에 실패했어요. 다시 시도해주세요.')
      btn.disabled = false; btn.textContent = '판매글 등록'
    }
  }

  init()
</script>
</body>
</html>
