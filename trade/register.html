<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <link rel="icon" type="image/svg+xml" href="/favicon.svg">
  <link rel="shortcut icon" href="/favicon.svg">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>판매계정 등록 | 플레이센스</title>
  <link rel="stylesheet" href="/css/style.css">
  <style>
    .step-indicator {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      padding: 24px 0 16px;
    }
    .step {
      width: 30px; height: 30px;
      border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      font-size: 13px; font-weight: 700;
      background: var(--border); color: var(--text-muted);
      transition: all 0.3s;
    }
    .step.active { background: #111; color: #fff; }
    .step.done { background: #10b981; color: #fff; }
    .step-line { flex: 1; max-width: 48px; height: 2px; background: var(--border); }

    .step-panel { display: none; }
    .step-panel.active { display: block; }


    /* 캐릭터 그리드 */
    .char-grade-list {
      max-height: 420px;
      overflow-y: auto;
      padding-right: 4px;
    }
    .char-grade-list::-webkit-scrollbar { width: 4px; }
    .char-grade-list::-webkit-scrollbar-track { background: transparent; }
    .char-grade-list::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; }
    .char-grade-section { margin-bottom: 14px; }
    .char-grade-header {
      display: flex;
      align-items: center;
      gap: 6px;
      margin-bottom: 6px;
      font-size: 12px;
      font-weight: 700;
    }
    .char-grade-header .grade-dot {
      width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0;
    }
    .char-grid {
      display: grid;
      grid-template-columns: repeat(5, 1fr);
      gap: 6px;
    }

    /* 게임 선택 카드 */
    .game-select-grid {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 10px;
      margin-bottom: 20px;
      align-items: start;
    }
    .game-select-card {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 7px;
      padding: 12px 6px 10px;
      border: 2px solid transparent;
      border-radius: 16px;
      cursor: pointer;
      transition: all 0.15s;
      background: #f5f5f5;
      text-align: center;
      aspect-ratio: unset;
    }
    .game-select-card:hover { background: #ebebeb; }
    .game-select-card.selected { border-color: #111; background: #fff; box-shadow: 0 0 0 1px #111; }
    .game-select-card .game-icon-wrap {
      width: 52px; height: 52px; flex-shrink: 0;
    }
    .game-select-card .game-icon-wrap img {
      width: 52px; height: 52px; border-radius: 14px; object-fit: cover;
      box-shadow: 0 2px 8px rgba(0,0,0,0.12);
    }
    .game-select-card .game-emoji {
      font-size: 32px; width: 52px; height: 52px;
      display: flex; align-items: center; justify-content: center;
    }
    .game-select-card .game-name { font-size: 11px; font-weight: 700; color: #333; word-break: keep-all; line-height: 1.3; }

    .char-item {
      position: relative;
      border: 2px solid var(--border);
      border-radius: 8px;
      overflow: hidden;
      cursor: pointer;
      transition: all 0.15s;
      aspect-ratio: 1/1;
      background: #f3f4f6;
    }
    .char-item:hover { border-color: #aaa; }
    .char-item.selected {
      border-color: #111 !important;
      box-shadow: 0 0 0 1px #111;
    }
    .char-item img {
      width: 100%; height: 100%;
      object-fit: cover; display: block;
    }
    .char-item .char-no-img {
      width: 100%; height: 100%;
      display: flex; align-items: center; justify-content: center;
      font-size: 20px; color: #ccc;
    }
    .char-item .char-name-label {
      position: absolute;
      bottom: 0; left: 0; right: 0;
      background: linear-gradient(to top, rgba(0,0,0,0.8) 0%, transparent 100%);
      color: #fff;
      font-size: 9px;
      font-weight: 600;
      padding: 12px 3px 4px;
      text-align: center;
      line-height: 1.2;
    }
    .char-item .check-overlay {
      display: none;
      position: absolute; inset: 0;
      background: rgba(0,0,0,0.5);
      align-items: center; justify-content: center;
    }
    .check-overlay svg {
      width: 22px; height: 22px;
      filter: drop-shadow(0 1px 3px rgba(0,0,0,0.5));
    }
    .char-count-badge {
      position: absolute;
      top: 3px; right: 3px;
      background: #111;
      color: #fff;
      border-radius: 999px;
      font-size: 10px; font-weight: 700;
      min-width: 16px; height: 16px;
      display: flex; align-items: center; justify-content: center;
      padding: 0 3px; z-index: 2;
    }

    /* 선택된 캐릭터 표시 */
    .selected-chars-bar {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
      min-height: 40px;
      padding: 10px 12px;
      border: 1.5px dashed var(--border);
      border-radius: 10px;
      margin-bottom: 14px;
      align-items: center;
    }
    .selected-char-tag {
      display: flex;
      align-items: center;
      gap: 4px;
      background: #111;
      color: #fff;
      border-radius: 999px;
      padding: 4px 10px 4px 8px;
      font-size: 12px;
      font-weight: 600;
    }
    .selected-char-tag img {
      width: 20px; height: 20px;
      border-radius: 50%;
      object-fit: cover;
    }
    .selected-char-tag button {
      background: none; border: none; color: rgba(255,255,255,0.7); cursor: pointer;
      font-size: 14px; line-height: 1; padding: 0; margin-left: 2px;
    }
    .selected-char-tag button:hover { color: #fff; }

    /* 재화 입력 */
    .currency-section {
      margin-top: 16px;
      border-top: 1.5px solid var(--border);
      padding-top: 14px;
    }
    .currency-section-title {
      font-size: 13px;
      font-weight: 700;
      color: #555;
      margin-bottom: 10px;
      display: flex;
      align-items: center;
      gap: 6px;
    }
    .currency-grid {
      display: flex;
      flex-direction: column;
      gap: 8px;
    }
    .currency-row {
      display: flex;
      align-items: center;
      gap: 10px;
    }
    .currency-icon {
      width: 32px; height: 32px;
      border-radius: 8px;
      object-fit: cover;
      flex-shrink: 0;
    }
    .currency-icon-placeholder {
      width: 32px; height: 32px;
      border-radius: 8px;
      background: #f3f4f6;
      display: flex; align-items: center; justify-content: center;
      font-size: 18px; flex-shrink: 0;
    }
    .currency-name {
      font-size: 13px; font-weight: 600; flex: 1; min-width: 0;
      white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
    }
    .currency-input {
      width: 110px;
      padding: 7px 10px;
      border: 1.5px solid var(--border);
      border-radius: 8px;
      font-size: 13px;
      font-family: inherit;
      text-align: right;
      flex-shrink: 0;
    }
    .currency-input:focus { outline: none; border-color: #111; }

    .price-input-wrap { position: relative; }
    .price-input-wrap input { padding-right: 40px; }
    .price-unit { position: absolute; right: 14px; top: 50%; transform: translateY(-50%); color: var(--text-muted); font-size: 14px; }

    .summary-box {
      background: #f8f8f8;
      border: 1.5px solid var(--border);
      border-radius: 12px;
      padding: 16px;
      margin-bottom: 20px;
    }
    .summary-row { display: flex; justify-content: space-between; align-items: flex-start; font-size: 14px; margin-bottom: 10px; gap: 12px; }
    .summary-row:last-child { margin-bottom: 0; }
    .summary-row > span:first-child { color: var(--text-muted); white-space: nowrap; padding-top: 2px; }
    .summary-row strong { font-weight: 600; text-align: right; }
    .summary-chars {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
      justify-content: flex-end;
    }
    .summary-char-card {
      display: flex;
      align-items: center;
      gap: 5px;
      background: #fff;
      border: 1.5px solid var(--border);
      border-radius: 8px;
      padding: 4px 8px 4px 4px;
      font-size: 12px;
      font-weight: 600;
    }
    .summary-char-card img {
      width: 26px; height: 26px;
      border-radius: 6px;
      object-fit: cover;
    }
  </style>
</head>
<body>

<div id="navbar"></div>

<div style="max-width:560px;margin:0 auto;padding:0 20px 60px;flex:1;">
  <div class="step-indicator">
    <div class="step active" id="step-dot-1">1</div>
    <div class="step-line"></div>
    <div class="step" id="step-dot-2">2</div>
    <div class="step-line"></div>
    <div class="step" id="step-dot-3">3</div>
  </div>

  <!-- STEP 1: 게임/서버 선택 -->
  <div class="step-panel active" id="panel-1">
    <div class="section-title" style="margin-bottom:20px;">게임과 서버를 선택하세요</div>
    <div class="form-group">
      <label class="form-label">게임</label>
      <div class="game-select-grid" id="game-select-grid">
        <div style="color:var(--text-muted);font-size:13px;grid-column:1/-1;">불러오는 중...</div>
      </div>
    </div>
    <div class="form-group" id="server-group" style="display:none;">
      <label class="form-label">서버</label>
      <select class="form-select" id="server-select">
        <option value="">서버 선택</option>
      </select>
    </div>
    <button class="btn btn-primary btn-full" onclick="goStep(2)" style="margin-top:4px;">다음 →</button>
    <a href="/trade/bulk.html" style="display:block;text-align:center;margin-top:12px;font-size:13px;color:#bbb;text-decoration:none;">여러 계정 한번에 올리기 →</a>
  </div>

  <!-- STEP 2: 캐릭터 선택 -->
  <div class="step-panel" id="panel-2">
    <div class="section-title" style="margin-bottom:12px;">보유 캐릭터를 선택하세요</div>

    <!-- UID 자동 불러오기 (원신 선택 시에만 표시) -->
    <div id="uid-lookup-section" style="display:none;background:#f8f5ff;border:1.5px solid #e0d4ff;border-radius:12px;padding:14px;margin-bottom:16px;">
      <div style="font-size:13px;font-weight:700;color:#6c47ff;margin-bottom:10px;">✨ UID로 캐릭터 자동 불러오기</div>
      <div style="display:flex;gap:8px;">
        <input type="text" id="uid-input" placeholder="UID 입력 (예: 618285856)" inputmode="numeric"
          style="flex:1;padding:8px 12px;border:1.5px solid #d4c5ff;border-radius:8px;font-size:13px;font-family:inherit;outline:none;"
          onfocus="this.style.borderColor='#6c47ff'" onblur="this.style.borderColor='#d4c5ff'"
          onkeydown="if(event.key==='Enter')lookupUid()">
        <button id="uid-lookup-btn" onclick="lookupUid()"
          style="padding:8px 16px;background:#6c47ff;color:#fff;border:none;border-radius:8px;font-size:13px;font-weight:600;cursor:pointer;white-space:nowrap;">조회</button>
      </div>
      <div id="uid-result" style="display:none;font-size:12px;margin-top:8px;"></div>
      <div style="font-size:11px;color:#a78bfa;margin-top:6px;">쇼케이스에 올린 캐릭터(최대 8개)가 자동 선택돼요. 직접 추가·제거도 가능해요.</div>
    </div>

    <div class="selected-chars-bar" id="selected-chars">
      <span style="color:var(--text-muted);font-size:13px;" id="selected-placeholder">캐릭터를 선택하면 여기 표시돼요</span>
    </div>

    <input type="text" id="char-search" placeholder="캐릭터 이름 검색..." oninput="filterCharsByName(this.value)"
      style="width:100%;box-sizing:border-box;padding:8px 12px;border:1.5px solid var(--border);border-radius:8px;font-size:13px;font-family:inherit;margin-bottom:10px;outline:none;"
      onfocus="this.style.borderColor='#111'" onblur="this.style.borderColor='var(--border)'">

    <div class="char-grade-list" id="char-grade-list">
      <div class="loading">불러오는 중...</div>
    </div>

    <!-- 재화 입력 (게임에 재화가 있을 때만 표시) -->
    <div class="currency-section" id="currency-section" style="display:none;">
      <div class="currency-section-title">💎 보유 재화 <span style="font-weight:400;color:#aaa;font-size:12px;">(선택)</span></div>
      <div class="currency-grid" id="currency-grid"></div>
    </div>

    <div style="display:flex;gap:8px;margin-top:16px;">
      <button class="btn btn-outline" onclick="goStep(1)" style="flex:1;">← 이전</button>
      <button class="btn btn-primary" onclick="goStep(3)" style="flex:2;">다음 →</button>
    </div>
  </div>

  <!-- STEP 3: 가격/연락처 -->
  <div class="step-panel" id="panel-3">
    <div class="section-title" style="margin-bottom:20px;">가격과 연락처를 입력하세요</div>

    <div class="summary-box" id="summary-box"></div>

    <div class="form-group">
      <label class="form-label">판매가격 <span style="color:red">*</span></label>
      <div class="price-input-wrap">
        <input type="text" inputmode="numeric" class="form-input" id="price-input" placeholder="50,000" oninput="handlePriceInput(this)">
        <span class="price-unit">원</span>
      </div>
    </div>
    <div class="form-group">
      <label class="form-label">계정 설명 <span style="color:var(--text-muted);font-size:12px;">(선택)</span></label>
      <textarea class="form-textarea" id="desc-input" placeholder="계정 상태, 보유 재화 등 자유롭게 적어주세요"></textarea>
    </div>
    <div class="form-group">
      <label class="form-label">카카오 오픈채팅 링크 <span style="color:red">*</span></label>
      <input type="url" class="form-input" id="contact-input" placeholder="https://open.kakao.com/o/...">
      <div style="font-size:12px;color:#888;margin-top:6px;">구매 신청 후에만 구매자에게 공개돼요</div>
    </div>

    <div style="display:flex;gap:8px;">
      <button class="btn btn-outline" onclick="goStep(2)" style="flex:1;">← 이전</button>
      <button class="btn btn-primary" onclick="submitListing()" style="flex:2;" id="submit-btn">판매글 등록</button>
    </div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="/js/config.js"></script>
<script>
  document.getElementById('navbar').innerHTML = renderNavbar('sell')
  loadAndRenderGameUI(null)

  let selectedGameId = null
  let selectedGame = null
  let selectedServerId = null
  let selectedChars = {}  // { charId: { char, count } }
  let allChars = []
  let allCurrencies = []
  let selectedCurrencies = {}  // { currencyId: { currency, amount } }
  let editListingId = null
  const gameStore = {}  // id → game 객체
  const charStore = {}  // id → character 객체
  const currencyStore = {}  // id → currency 객체

  async function init() {
    const params = new URLSearchParams(location.search)
    editListingId = params.get('edit') || null

    if (editListingId) {
      document.querySelector('h1') && (document.querySelector('h1').textContent = '판매글 수정')
      document.getElementById('submit-btn').textContent = '수정 완료'
    }

    const { data: games } = await db.from('Game').select('id, nameKo, slug, emoji, imageUrl').eq('isActive', true).order('sortOrder', { nullsFirst: false }).order('nameKo')
    const grid = document.getElementById('game-select-grid')
    if (!games || games.length === 0) {
      grid.innerHTML = '<div style="color:var(--text-muted);font-size:13px;">게임이 없어요</div>'
      return
    }
    games.forEach(g => { gameStore[g.id] = g })
    grid.innerHTML = games.map(g => `
      <div class="game-select-card" id="gcard-${g.id}" onclick="selectGame('${g.id}')">
        <div class="game-icon-wrap">
          ${g.imageUrl
            ? `<img src="${g.imageUrl}" alt="${g.nameKo}">`
            : `<div class="game-emoji">${g.emoji ?? ''}</div>`
          }
        </div>
        <span class="game-name">${g.nameKo}</span>
      </div>
    `).join('')

    // 수정 모드: 기존 데이터 불러오기
    if (editListingId) {
      const { data: listing } = await db.from('Listing')
        .select(`id, price, description, kakaoOpenChatUrl, gameId, serverId,
          game:Game(id, nameKo, slug, emoji, imageUrl),
          server:Server(id, nameKo),
          characters:ListingCharacter(count, character:Character(id, nameKo, tier, imageUrl)),
          currencies:ListingCurrency(amount, currency:Currency(id, nameKo, imageUrl, sortOrder))`)
        .eq('id', editListingId).single()
      if (!listing) { alert('판매글을 찾을 수 없어요'); return }

      // 게임 선택
      if (games.find(g => g.id === listing.gameId)) {
        await selectGame(listing.gameId)
        // 서버 선택
        if (listing.serverId) {
          const serverSel = document.getElementById('server-select')
          serverSel.value = listing.serverId
          selectedServerId = listing.serverId
        }
      }

      // 캐릭터 선택 (selectedChars를 먼저 세팅 후 loadChars 호출)
      selectedChars = {}
      ;(listing.characters ?? []).forEach(lc => {
        if (lc.character) {
          selectedChars[lc.character.id] = { char: lc.character, count: lc.count ?? 1 }
        }
      })
      // 재화 선택 (loadCurrencies 전에 미리 세팅)
      selectedCurrencies = {}
      ;(listing.currencies ?? []).forEach(lc => {
        if (lc.currency) {
          selectedCurrencies[lc.currency.id] = { currency: lc.currency, amount: lc.amount ?? 0 }
          currencyStore[lc.currency.id] = lc.currency
        }
      })
      await loadChars()
      renderSelectedChars()

      const uidSection = document.getElementById('uid-lookup-section')
      if (uidSection) uidSection.style.display = listing.game?.slug === 'genshin' ? 'block' : 'none'

      // 가격/설명/연락처
      document.getElementById('price-input').value = listing.price ? Number(listing.price).toLocaleString('ko-KR') : ''
      document.getElementById('desc-input').value = listing.description ?? ''
      document.getElementById('contact-input').value = listing.kakaoOpenChatUrl ?? ''

      goStep(2)
    }
  }

  async function selectGame(gameId) {
    const g = gameStore[gameId]
    if (!g) return
    selectedGameId = g.id
    selectedGame = g
    selectedChars = {}
    allChars = []
    allCurrencies = []
    selectedCurrencies = {}

    // 카드 선택 표시
    document.querySelectorAll('.game-select-card').forEach(el => el.classList.remove('selected'))
    document.getElementById('gcard-' + g.id)?.classList.add('selected')

    // 서버 로드
    const serverSel = document.getElementById('server-select')
    serverSel.innerHTML = '<option value="">서버 선택</option>'
    const { data: servers } = await db.from('Server').select('id, nameKo').eq('gameId', g.id)
    servers?.forEach(s => {
      const opt = document.createElement('option')
      opt.value = s.id; opt.textContent = s.nameKo; serverSel.appendChild(opt)
    })
    serverSel.onchange = () => { selectedServerId = serverSel.value }

    document.getElementById('server-group').style.display = 'block'
  }

  async function loadChars() {
    if (!selectedGameId) return
    const { data: chars } = await db
      .from('Character')
      .select('id, nameKo, tier, imageUrl')
      .eq('gameId', selectedGameId)
      .eq('isActive', true)
      .order('nameKo')
    allChars = chars ?? []
    const searchEl = document.getElementById('char-search')
    if (searchEl) searchEl.value = ''
    renderCharGrid()
    await loadCurrencies()
  }

  async function loadCurrencies() {
    if (!selectedGameId) return
    const { data: currencies } = await db
      .from('Currency')
      .select('id, nameKo, imageUrl, sortOrder')
      .eq('gameId', selectedGameId)
      .eq('isActive', true)
      .order('sortOrder')
      .order('nameKo')
    allCurrencies = currencies ?? []
    currencies?.forEach(c => { currencyStore[c.id] = c })
    renderCurrencyGrid()
  }

  function renderCurrencyGrid() {
    const section = document.getElementById('currency-section')
    const grid = document.getElementById('currency-grid')
    if (!section || !grid) return

    if (allCurrencies.length === 0) {
      section.style.display = 'none'
      return
    }
    section.style.display = 'block'
    grid.innerHTML = allCurrencies.map(c => {
      const amount = selectedCurrencies[c.id]?.amount ?? ''
      const iconHtml = c.imageUrl
        ? `<img class="currency-icon" src="${c.imageUrl}" alt="${c.nameKo}">`
        : `<div class="currency-icon-placeholder">💎</div>`
      return `
        <div class="currency-row">
          ${iconHtml}
          <span class="currency-name">${c.nameKo}</span>
          <input class="currency-input" type="text" inputmode="numeric"
            id="currency-input-${c.id}"
            placeholder="0"
            value="${amount}"
            oninput="handleCurrencyInput(this, '${c.id}')">
        </div>`
    }).join('')
  }

  function handleCurrencyInput(input, currencyId) {
    const raw = input.value.replace(/[^0-9]/g, '')
    input.value = raw ? Number(raw).toLocaleString('ko-KR') : ''
    const amount = raw ? parseInt(raw) : 0
    const c = currencyStore[currencyId]
    if (!c) return
    if (amount > 0) {
      selectedCurrencies[currencyId] = { currency: c, amount }
    } else {
      delete selectedCurrencies[currencyId]
    }
  }

  // 게임별 등급 표시 순서
  const GRADE_ORDER_MAP = {
    'nikke':           ['SSS','SS','S','A','B','C'],
    'genshin':         ['SS','S','A','B','C','D','E','F'],
    'bluearchive':     ['아비도스','게헨나','밀레니엄 사이언스','트리니티','백귀야행','산해경','붉은겨울','발키리','SRT','아리우스','하이랜더','와일드헌트','사쿠가와','토키와다이','기타'],
    'cookie-run':      ['위치','비스트','에인션트 각성','에인션트','레전더리','드래곤','슈퍼에픽','에픽','레어','커먼'],
    'leehwan':         ['S','A','B'],
  }

  function getGradeOrder() {
    const slug = selectedGame?.slug
    return GRADE_ORDER_MAP[slug] || []
  }

  // 등급별 점 색상
  const GRADE_DOT_COLOR = {
    // 니케
    'SSS': '#c026d3', 'SS': '#ea580c', 'S': '#d97706', 'A': '#7c3aed', 'B': '#3b82f6', 'C': '#9ca3af',
    // 쿠키런
    '위치': '#7c3aed', '비스트': '#334155', '에인션트 각성': '#d97706',
    '에인션트': '#b45309', '레전더리': '#ea580c', '드래곤': '#059669',
    '슈퍼에픽': '#7c3aed', '에픽': '#3b82f6', '레어': '#22c55e', '커먼': '#9ca3af',
    // 원신
    '5성': '#ea580c', '4성': '#7c3aed',
    // 블루아카이브
    'UE': '#c026d3', 'E': '#ea580c', 'SR': '#7c3aed', 'R': '#3b82f6',
  }

  function filterCharsByName(term) {
    const t = term.trim().toLowerCase()
    const filtered = t ? allChars.filter(c => c.nameKo.toLowerCase().includes(t)) : allChars
    renderCharGrid(filtered)
  }

  function renderCharGrid(chars) {
    chars = chars ?? allChars
    const container = document.getElementById('char-grade-list')
    if (!chars.length) {
      container.innerHTML = '<div style="text-align:center;padding:24px;color:var(--text-muted);">검색 결과가 없어요</div>'
      return
    }
    if (!allChars.length) {
      container.innerHTML = '<div style="text-align:center;padding:24px;color:var(--text-muted);">캐릭터가 없어요</div>'
      return
    }

    // 등급별 그룹핑
    const groups = {}
    chars.forEach(c => {
      const g = c.tier || '기타'
      if (!groups[g]) groups[g] = []
      groups[g].push(c)
    })

    // 순서대로 렌더링
    const GRADE_ORDER = getGradeOrder()
    const orderedGrades = [...GRADE_ORDER.filter(g => groups[g]), ...Object.keys(groups).filter(g => !GRADE_ORDER.includes(g))]

    chars.forEach(c => { charStore[c.id] = c })
    container.innerHTML = orderedGrades.map(grade => {
      const chars = groups[grade]
      const gc = gradeClass(grade)
      const dot = GRADE_DOT_COLOR[grade] || '#9ca3af'
      const cards = chars.map(c => {
        const entry = selectedChars[c.id]
        const count = entry?.count ?? 0
        const isSelected = !!entry
        return `
          <div class="char-item${isSelected ? ' selected' : ''}${gc ? ' grade-border-' + gc : ''}" id="char-${c.id}" onclick="clickChar('${c.id}')">
            ${c.imageUrl ? `<img src="${c.imageUrl}" alt="${c.nameKo}" loading="lazy">` : `<div class="char-no-img">?</div>`}
            <div class="char-name-label">${c.nameKo}</div>
            <div class="check-overlay" style="${isSelected ? 'display:flex;' : 'display:none;'}">
              <svg viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg>
            </div>
            <div class="char-count-badge" style="${count > 1 ? '' : 'display:none;'}">${count > 1 ? count : ''}</div>
          </div>`
      }).join('')

      return `
        <div class="char-grade-section">
          <div class="char-grade-header">
            <span class="grade-dot" style="background:${dot};"></span>
            <span>${grade}</span>
            <span style="color:var(--text-muted);font-weight:400;">${chars.length}개</span>
          </div>
          <div class="char-grid">${cards}</div>
        </div>`
    }).join('')
  }

  function clickChar(charId) {
    const c = charStore[charId]
    if (!c) return
    if (!selectedChars[charId]) {
      selectedChars[charId] = { char: c, count: 1 }
    } else {
      selectedChars[charId].count++
    }
    updateCharItem(charId)
    renderSelectedChars()
  }

  function removeChar(charId) {
    delete selectedChars[charId]
    updateCharItem(charId)
    renderSelectedChars()
  }

  function updateCharItem(charId) {
    const el = document.getElementById('char-' + charId)
    if (!el) return
    const entry = selectedChars[charId]
    const overlay = el.querySelector('.check-overlay')
    const badge = el.querySelector('.char-count-badge')
    if (!entry) {
      el.classList.remove('selected')
      if (overlay) overlay.style.display = 'none'
      if (badge) badge.style.display = 'none'
    } else {
      el.classList.add('selected')
      if (overlay) overlay.style.display = 'flex'
      if (entry.count > 1) {
        if (badge) { badge.style.display = 'flex'; badge.textContent = entry.count }
      } else {
        if (badge) badge.style.display = 'none'
      }
    }
  }

  function renderSelectedChars() {
    const el = document.getElementById('selected-chars')
    const entries = Object.values(selectedChars)

    if (entries.length === 0) {
      el.innerHTML = '<span style="color:var(--text-muted);font-size:13px;" id="selected-placeholder">캐릭터를 선택하면 여기 표시돼요</span>'
      return
    }

    el.innerHTML = entries.map(({ char: c, count }) => `
      <span class="selected-char-tag">
        ${c.imageUrl ? `<img src="${c.imageUrl}" alt="${c.nameKo}">` : ''}
        ${c.nameKo}${count > 1 ? ` ×${count}` : ''}
        <button onclick="event.stopPropagation();removeChar('${c.id}')">×</button>
      </span>
    `).join('')
  }

  function goStep(n) {
    if (n === 2) {
      if (!selectedGameId) { alert('게임을 선택해주세요'); return }
      const serverVal = document.getElementById('server-select').value
      if (!serverVal) { alert('서버를 선택해주세요'); return }
      selectedServerId = serverVal

      const uidSection = document.getElementById('uid-lookup-section')
      if (uidSection) uidSection.style.display = selectedGame?.slug === 'genshin' ? 'block' : 'none'

      loadChars()
    }
    if (n === 3) {
      renderSummary()
    }
    document.querySelectorAll('.step-panel').forEach((p, i) => {
      p.classList.toggle('active', i + 1 === n)
    })
    document.querySelectorAll('.step').forEach((s, i) => {
      s.classList.remove('active', 'done')
      if (i + 1 < n) s.classList.add('done')
      else if (i + 1 === n) s.classList.add('active')
    })
  }

  function renderSummary() {
    const selectedCard = document.querySelector('.game-select-card.selected .game-name')
    const gameText = selectedCard?.textContent ?? ''
    const serverSel = document.getElementById('server-select')
    const serverText = serverSel.options[serverSel.selectedIndex]?.text ?? ''

    const charsHtml = Object.keys(selectedChars).length > 0
      ? `<div class="summary-chars">${Object.values(selectedChars).map(({ char: c, count }) => `
            <div class="summary-char-card">
              ${c.imageUrl ? `<img src="${c.imageUrl}" alt="${c.nameKo}">` : ''}
              <span>${c.nameKo}${count > 1 ? ` ×${count}` : ''}</span>
            </div>
          `).join('')}</div>`
      : '<strong style="color:var(--text-muted);">선택 안 함</strong>'

    const currencyEntries = Object.values(selectedCurrencies)
    const currenciesHtml = currencyEntries.length > 0
      ? `<div style="display:flex;flex-wrap:wrap;gap:6px;justify-content:flex-end;">${currencyEntries.map(({ currency: c, amount }) => `
          <div class="summary-char-card">
            ${c.imageUrl ? `<img src="${c.imageUrl}" alt="${c.nameKo}" style="width:20px;height:20px;border-radius:5px;object-fit:cover;">` : '<span style="font-size:14px;">💎</span>'}
            <span>${c.nameKo} ${amount.toLocaleString()}</span>
          </div>`).join('')}</div>`
      : '<strong style="color:var(--text-muted);">입력 안 함</strong>'

    document.getElementById('summary-box').innerHTML = `
      <div class="summary-row"><span>게임</span><strong>${gameText}</strong></div>
      <div class="summary-row"><span>서버</span><strong>${serverText}</strong></div>
      <div class="summary-row"><span>캐릭터</span>${charsHtml}</div>
      ${currencyEntries.length > 0 ? `<div class="summary-row"><span>보유 재화</span>${currenciesHtml}</div>` : ''}
    `
  }

  // ===== 원신 UID 조회 =====
  let genshinCharMap = null

  async function buildGenshinCharMap() {
    if (genshinCharMap) return genshinCharMap
    const cached = sessionStorage.getItem('gi-char-map-v1')
    if (cached) { genshinCharMap = JSON.parse(cached); return genshinCharMap }
    try {
      const res = await fetch('https://gi.yatta.moe/api/v2/KR/avatar')
      const json = await res.json()
      const items = json?.data?.items ?? {}
      genshinCharMap = {}
      Object.values(items).forEach(c => { genshinCharMap[String(c.id)] = c.name })
      sessionStorage.setItem('gi-char-map-v1', JSON.stringify(genshinCharMap))
    } catch { genshinCharMap = {} }
    return genshinCharMap
  }

  async function lookupUid() {
    const uid = document.getElementById('uid-input').value.trim()
    if (!/^\d{6,10}$/.test(uid)) { showUidResult('error', 'UID는 6~10자리 숫자예요'); return }

    const btn = document.getElementById('uid-lookup-btn')
    btn.disabled = true; btn.textContent = '조회 중...'
    showUidResult('loading', '계정 정보를 불러오는 중...')

    try {
      const [charMap, enkaRes] = await Promise.all([
        buildGenshinCharMap(),
        fetch('/api/enka/' + uid)
      ])

      if (!enkaRes.ok) {
        const msgs = { 400: 'UID를 찾을 수 없어요', 404: '존재하지 않는 UID예요', 429: '잠시 후 다시 시도해주세요' }
        showUidResult('error', msgs[enkaRes.status] ?? '조회에 실패했어요')
        return
      }

      const data = await enkaRes.json()
      const playerInfo = data.playerInfo
      const showcaseChars = data.avatarInfoList ?? []

      if (!playerInfo) { showUidResult('error', '계정 정보를 불러올 수 없어요'); return }

      const normalize = s => s.replace(/\s/g, '').toLowerCase()
      let matched = 0
      for (const avatar of showcaseChars) {
        const name = charMap[String(avatar.avatarId)]
        if (!name) continue
        const dbChar = allChars.find(c => normalize(c.nameKo) === normalize(name))
        if (dbChar && !selectedChars[dbChar.id]) {
          selectedChars[dbChar.id] = { char: dbChar, count: 1 }
          matched++
        }
      }

      renderCharGrid()
      renderSelectedChars()

      const nickname = playerInfo.nickname ?? '알 수 없음'
      const level = playerInfo.level ?? '?'
      showUidResult('success', `${nickname} · AR${level} · 쇼케이스 ${matched}명이 자동 선택됐어요`)
    } catch { showUidResult('error', '조회에 실패했어요') }
    finally { btn.disabled = false; btn.textContent = '조회' }
  }

  function showUidResult(type, msg) {
    const el = document.getElementById('uid-result')
    const colors = { success: '#10b981', error: '#ef4444', loading: '#94a3b8' }
    el.style.display = 'block'
    el.style.color = colors[type] ?? '#666'
    el.textContent = msg
  }

  function handlePriceInput(input) {
    const raw = input.value.replace(/[^0-9]/g, '')
    input.value = raw ? Number(raw).toLocaleString('ko-KR') : ''
  }

  async function submitListing() {
    const price = Number(document.getElementById('price-input').value.replace(/,/g, ''))
    const contact = document.getElementById('contact-input').value.trim()
    if (!selectedServerId) { alert('서버를 선택해주세요'); goStep(1); return }
    if (!price || price <= 0) { alert('판매가격을 입력해주세요'); return }
    if (!contact) { alert('카카오 오픈채팅 링크를 입력해주세요'); return }

    const btn = document.getElementById('submit-btn')
    btn.disabled = true; btn.textContent = '등록 중...'

    try {
      const authUser = await requireAuth()
      if (!authUser) return

      const desc = document.getElementById('desc-input').value || null
      const updatedAt = new Date().toISOString()

      if (editListingId) {
        // 수정 모드
        const { error } = await db.from('Listing').update({
          gameId: selectedGameId,
          serverId: selectedServerId,
          price,
          description: desc,
          kakaoOpenChatUrl: contact,
          updatedAt,
        }).eq('id', editListingId)
        if (error) throw error

        // 캐릭터 재등록
        await db.from('ListingCharacter').delete().eq('listingId', editListingId)
        if (Object.keys(selectedChars).length > 0) {
          await db.from('ListingCharacter').insert(
            Object.values(selectedChars).map(({ char: c, count }) => ({ listingId: editListingId, characterId: c.id, count }))
          )
        }
        // 재화 재등록
        await db.from('ListingCurrency').delete().eq('listingId', editListingId)
        if (Object.keys(selectedCurrencies).length > 0) {
          await db.from('ListingCurrency').insert(
            Object.values(selectedCurrencies).map(({ currency: c, amount }) => ({ listingId: editListingId, currencyId: c.id, amount }))
          )
        }
        alert('판매글이 수정됐어요!')
        window.location.href = '/listing/?id=' + editListingId
      } else {
        // 신규 등록
        const listingId = 'c' + Date.now().toString(36) + Math.random().toString(36).slice(2, 10)
        const { data: listing, error } = await db.from('Listing').insert({
          id: listingId,
          userId: authUser.id,
          gameId: selectedGameId,
          serverId: selectedServerId,
          price,
          description: desc,
          kakaoOpenChatUrl: contact,
          status: 'active',
          viewCount: 0,
          createdAt: updatedAt,
          updatedAt,
        }).select().single()
        if (error) throw error

        if (Object.keys(selectedChars).length > 0) {
          await db.from('ListingCharacter').insert(
            Object.values(selectedChars).map(({ char: c, count }) => ({ listingId: listing.id, characterId: c.id, count }))
          )
        }
        if (Object.keys(selectedCurrencies).length > 0) {
          await db.from('ListingCurrency').insert(
            Object.values(selectedCurrencies).map(({ currency: c, amount }) => ({ listingId: listing.id, currencyId: c.id, amount }))
          )
        }
        alert('판매글이 등록됐어요!')
        window.location.href = '/'
      }
    } catch (e) {
      console.error(e)
      alert('에러: ' + (e?.message ?? JSON.stringify(e)))
      btn.disabled = false; btn.textContent = '판매글 등록'
    }
  }

  init()
</script>
