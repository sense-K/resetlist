<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>판매계정 등록 | 리세 리스트</title>
  <link rel="stylesheet" href="/css/style.css">
  <style>
    .step-indicator {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      padding: 24px 0 16px;
    }
    .step {
      width: 30px; height: 30px;
      border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      font-size: 13px; font-weight: 700;
      background: var(--border); color: var(--text-muted);
      transition: all 0.3s;
    }
    .step.active { background: #111; color: #fff; }
    .step.done { background: #10b981; color: #fff; }
    .step-line { flex: 1; max-width: 48px; height: 2px; background: var(--border); }

    .step-panel { display: none; }
    .step-panel.active { display: block; }


    /* 캐릭터 그리드 */
    .char-grade-list {
      max-height: 420px;
      overflow-y: auto;
      padding-right: 4px;
    }
    .char-grade-list::-webkit-scrollbar { width: 4px; }
    .char-grade-list::-webkit-scrollbar-track { background: transparent; }
    .char-grade-list::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; }
    .char-grade-section { margin-bottom: 14px; }
    .char-grade-header {
      display: flex;
      align-items: center;
      gap: 6px;
      margin-bottom: 6px;
      font-size: 12px;
      font-weight: 700;
    }
    .char-grade-header .grade-dot {
      width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0;
    }
    .char-grid {
      display: grid;
      grid-template-columns: repeat(5, 1fr);
      gap: 6px;
    }

    /* 게임 선택 카드 */
    .game-select-grid {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 10px;
      margin-bottom: 20px;
    }
    .game-select-card {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 7px;
      padding: 12px 6px 10px;
      border: 2px solid transparent;
      border-radius: 16px;
      cursor: pointer;
      transition: all 0.15s;
      background: #f5f5f5;
      text-align: center;
    }
    .game-select-card:hover { background: #ebebeb; }
    .game-select-card.selected { border-color: #111; background: #fff; box-shadow: 0 0 0 1px #111; }
    .game-select-card .game-icon-wrap {
      width: 52px; height: 52px; flex-shrink: 0;
    }
    .game-select-card .game-icon-wrap img {
      width: 52px; height: 52px; border-radius: 14px; object-fit: cover;
      box-shadow: 0 2px 8px rgba(0,0,0,0.12);
    }
    .game-select-card .game-emoji {
      font-size: 32px; width: 52px; height: 52px;
      display: flex; align-items: center; justify-content: center;
    }
    .game-select-card .game-name { font-size: 11px; font-weight: 700; color: #333; word-break: keep-all; line-height: 1.3; }

    .char-item {
      position: relative;
      border: 2px solid var(--border);
      border-radius: 8px;
      overflow: hidden;
      cursor: pointer;
      transition: all 0.15s;
      aspect-ratio: 1/1;
      background: #f3f4f6;
    }
    .char-item:hover { border-color: #aaa; }
    .char-item.selected {
      border-color: #111 !important;
      box-shadow: 0 0 0 1px #111;
    }
    .char-item img {
      width: 100%; height: 100%;
      object-fit: cover; display: block;
    }
    .char-item .char-no-img {
      width: 100%; height: 100%;
      display: flex; align-items: center; justify-content: center;
      font-size: 20px; color: #ccc;
    }
    .char-item .char-name-label {
      position: absolute;
      bottom: 0; left: 0; right: 0;
      background: linear-gradient(to top, rgba(0,0,0,0.8) 0%, transparent 100%);
      color: #fff;
      font-size: 9px;
      font-weight: 600;
      padding: 12px 3px 4px;
      text-align: center;
      line-height: 1.2;
    }
    .char-item .check-overlay {
      display: none;
      position: absolute; inset: 0;
      background: rgba(0,0,0,0.5);
      align-items: center; justify-content: center;
    }
    .char-item.selected .check-overlay { display: flex; }
    .check-overlay svg {
      width: 22px; height: 22px;
      filter: drop-shadow(0 1px 3px rgba(0,0,0,0.5));
    }

    /* 선택된 캐릭터 표시 */
    .selected-chars-bar {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
      min-height: 40px;
      padding: 10px 12px;
      border: 1.5px dashed var(--border);
      border-radius: 10px;
      margin-bottom: 14px;
      align-items: center;
    }
    .selected-char-tag {
      display: flex;
      align-items: center;
      gap: 4px;
      background: #111;
      color: #fff;
      border-radius: 999px;
      padding: 4px 10px 4px 8px;
      font-size: 12px;
      font-weight: 600;
    }
    .selected-char-tag img {
      width: 20px; height: 20px;
      border-radius: 50%;
      object-fit: cover;
    }
    .selected-char-tag button {
      background: none; border: none; color: rgba(255,255,255,0.7); cursor: pointer;
      font-size: 14px; line-height: 1; padding: 0; margin-left: 2px;
    }
    .selected-char-tag button:hover { color: #fff; }

    .price-input-wrap { position: relative; }
    .price-input-wrap input { padding-right: 40px; }
    .price-unit { position: absolute; right: 14px; top: 50%; transform: translateY(-50%); color: var(--text-muted); font-size: 14px; }

    .summary-box {
      background: #f8f8f8;
      border: 1.5px solid var(--border);
      border-radius: 12px;
      padding: 16px;
      margin-bottom: 20px;
    }
    .summary-row { display: flex; justify-content: space-between; align-items: flex-start; font-size: 14px; margin-bottom: 10px; gap: 12px; }
    .summary-row:last-child { margin-bottom: 0; }
    .summary-row > span:first-child { color: var(--text-muted); white-space: nowrap; padding-top: 2px; }
    .summary-row strong { font-weight: 600; text-align: right; }
    .summary-chars {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
      justify-content: flex-end;
    }
    .summary-char-card {
      display: flex;
      align-items: center;
      gap: 5px;
      background: #fff;
      border: 1.5px solid var(--border);
      border-radius: 8px;
      padding: 4px 8px 4px 4px;
      font-size: 12px;
      font-weight: 600;
    }
    .summary-char-card img {
      width: 26px; height: 26px;
      border-radius: 6px;
      object-fit: cover;
    }
  </style>
</head>
<body>

<div id="navbar"></div>

<div style="max-width:560px;margin:0 auto;padding:0 20px 60px;">
  <div class="step-indicator">
    <div class="step active" id="step-dot-1">1</div>
    <div class="step-line"></div>
    <div class="step" id="step-dot-2">2</div>
    <div class="step-line"></div>
    <div class="step" id="step-dot-3">3</div>
  </div>

  <!-- STEP 1: 게임/서버 선택 -->
  <div class="step-panel active" id="panel-1">
    <div class="section-title" style="margin-bottom:20px;">게임과 서버를 선택하세요</div>
    <div class="form-group">
      <label class="form-label">게임</label>
      <div class="game-select-grid" id="game-select-grid">
        <div style="color:var(--text-muted);font-size:13px;grid-column:1/-1;">불러오는 중...</div>
      </div>
    </div>
    <div class="form-group" id="server-group" style="display:none;">
      <label class="form-label">서버</label>
      <select class="form-select" id="server-select">
        <option value="">서버 선택</option>
      </select>
    </div>
    <button class="btn btn-primary btn-full" onclick="goStep(2)" style="margin-top:4px;">다음 →</button>
    <a href="/trade/bulk.html" style="display:block;text-align:center;margin-top:12px;font-size:13px;color:#bbb;text-decoration:none;">여러 계정 한번에 올리기 →</a>
  </div>

  <!-- STEP 2: 캐릭터 선택 -->
  <div class="step-panel" id="panel-2">
    <div class="section-title" style="margin-bottom:12px;">보유 캐릭터를 선택하세요</div>

    <div class="selected-chars-bar" id="selected-chars">
      <span style="color:var(--text-muted);font-size:13px;" id="selected-placeholder">캐릭터를 선택하면 여기 표시돼요</span>
    </div>

    <div class="char-grade-list" id="char-grade-list">
      <div class="loading">불러오는 중...</div>
    </div>

    <div style="display:flex;gap:8px;margin-top:16px;">
      <button class="btn btn-outline" onclick="goStep(1)" style="flex:1;">← 이전</button>
      <button class="btn btn-primary" onclick="goStep(3)" style="flex:2;">다음 →</button>
    </div>
  </div>

  <!-- STEP 3: 가격/연락처 -->
  <div class="step-panel" id="panel-3">
    <div class="section-title" style="margin-bottom:20px;">가격과 연락처를 입력하세요</div>

    <div class="summary-box" id="summary-box"></div>

    <div class="form-group">
      <label class="form-label">판매가격 <span style="color:red">*</span></label>
      <div class="price-input-wrap">
        <input type="text" inputmode="numeric" class="form-input" id="price-input" placeholder="50,000" oninput="handlePriceInput(this)">
        <span class="price-unit">원</span>
      </div>
    </div>
    <div class="form-group">
      <label class="form-label">계정 설명 <span style="color:var(--text-muted);font-size:12px;">(선택)</span></label>
      <textarea class="form-textarea" id="desc-input" placeholder="계정 상태, 보유 재화 등 자유롭게 적어주세요"></textarea>
    </div>
    <div class="form-group">
      <label class="form-label">카카오 오픈채팅 링크 <span style="color:red">*</span></label>
      <input type="url" class="form-input" id="contact-input" placeholder="https://open.kakao.com/o/...">
      <div style="font-size:12px;color:#888;margin-top:6px;">구매 신청 후에만 구매자에게 공개돼요</div>
    </div>

    <div style="display:flex;gap:8px;">
      <button class="btn btn-outline" onclick="goStep(2)" style="flex:1;">← 이전</button>
      <button class="btn btn-primary" onclick="submitListing()" style="flex:2;" id="submit-btn">판매글 등록</button>
    </div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="/js/config.js"></script>
<script>
  document.getElementById('navbar').innerHTML = renderNavbar('sell')

  let selectedGameId = null
  let selectedGame = null
  let selectedServerId = null
  let selectedChars = []
  let allChars = []
  let editListingId = null
  const gameStore = {}  // id → game 객체
  const charStore = {}  // id → character 객체

  async function init() {
    const params = new URLSearchParams(location.search)
    editListingId = params.get('edit') || null

    if (editListingId) {
      document.querySelector('h1') && (document.querySelector('h1').textContent = '판매글 수정')
      document.getElementById('submit-btn').textContent = '수정 완료'
    }

    const { data: games } = await db.from('Game').select('id, nameKo, slug, emoji, imageUrl').eq('isActive', true).order('sortOrder', { nullsFirst: false }).order('nameKo')
    const grid = document.getElementById('game-select-grid')
    if (!games || games.length === 0) {
      grid.innerHTML = '<div style="color:var(--text-muted);font-size:13px;">게임이 없어요</div>'
      return
    }
    games.forEach(g => { gameStore[g.id] = g })
    grid.innerHTML = games.map(g => `
      <div class="game-select-card" id="gcard-${g.id}" onclick="selectGame('${g.id}')">
        <div class="game-icon-wrap">
          ${g.imageUrl
            ? `<img src="${g.imageUrl}" alt="${g.nameKo}">`
            : `<div class="game-emoji">${g.emoji ?? ''}</div>`
          }
        </div>
        <span class="game-name">${g.nameKo}</span>
      </div>
    `).join('')

    // 수정 모드: 기존 데이터 불러오기
    if (editListingId) {
      const { data: listing } = await db.from('Listing')
        .select(`id, price, description, kakaoOpenChatUrl, gameId, serverId,
          game:Game(id, nameKo, slug, emoji, imageUrl),
          server:Server(id, nameKo),
          characters:ListingCharacter(character:Character(id, nameKo, tier, imageUrl))`)
        .eq('id', editListingId).single()
      if (!listing) { alert('판매글을 찾을 수 없어요'); return }

      // 게임 선택
      if (games.find(g => g.id === listing.gameId)) {
        await selectGame(listing.gameId)
        // 서버 선택
        if (listing.serverId) {
          const serverSel = document.getElementById('server-select')
          serverSel.value = listing.serverId
          selectedServerId = listing.serverId
        }
      }

      // 캐릭터 선택
      await loadChars()
      selectedChars = (listing.characters ?? []).map(lc => lc.character).filter(Boolean)
      selectedChars.forEach(c => {
        const el = document.getElementById('char-' + c.id)
        if (el) el.classList.add('selected')
      })
      renderSelectedChars()

      // 가격/설명/연락처
      document.getElementById('price-input').value = listing.price ? Number(listing.price).toLocaleString('ko-KR') : ''
      document.getElementById('desc-input').value = listing.description ?? ''
      document.getElementById('contact-input').value = listing.kakaoOpenChatUrl ?? ''

      goStep(2)
    }
  }

  async function selectGame(gameId) {
    const g = gameStore[gameId]
    if (!g) return
    selectedGameId = g.id
    selectedGame = g
    selectedChars = []
    allChars = []

    // 카드 선택 표시
    document.querySelectorAll('.game-select-card').forEach(el => el.classList.remove('selected'))
    document.getElementById('gcard-' + g.id)?.classList.add('selected')

    // 서버 로드
    const serverSel = document.getElementById('server-select')
    serverSel.innerHTML = '<option value="">서버 선택</option>'
    const { data: servers } = await db.from('Server').select('id, nameKo').eq('gameId', g.id)
    servers?.forEach(s => {
      const opt = document.createElement('option')
      opt.value = s.id; opt.textContent = s.nameKo; serverSel.appendChild(opt)
    })
    serverSel.onchange = () => { selectedServerId = serverSel.value }

    document.getElementById('server-group').style.display = 'block'
  }

  async function loadChars() {
    if (!selectedGameId) return
    const { data: chars } = await db
      .from('Character')
      .select('id, nameKo, tier, imageUrl')
      .eq('gameId', selectedGameId)
      .eq('isActive', true)
      .order('nameKo')
    allChars = chars ?? []
    renderCharGrid()
  }

  // 게임별 등급 표시 순서
  const GRADE_ORDER_MAP = {
    'nikke':           ['SSS','SS','S','A','B','C'],
    'genshin':         ['SS','S','A','B','C','D','E','F'],
    'bluearchive':     ['아비도스','게헨나','밀레니엄 사이언스','트리니티','백귀야행','산해경','붉은겨울','발키리','SRT','아리우스','하이랜더','와일드헌트','사쿠가와','토키와다이','기타'],
    'cookie-run':      ['위치','비스트','에인션트 각성','에인션트','레전더리','드래곤','슈퍼에픽','에픽','레어','커먼'],
  }

  function getGradeOrder() {
    const slug = selectedGame?.slug
    return GRADE_ORDER_MAP[slug] || []
  }

  // 등급별 점 색상
  const GRADE_DOT_COLOR = {
    // 니케
    'SSS': '#c026d3', 'SS': '#ea580c', 'S': '#d97706', 'A': '#7c3aed', 'B': '#3b82f6', 'C': '#9ca3af',
    // 쿠키런
    '위치': '#7c3aed', '비스트': '#334155', '에인션트 각성': '#d97706',
    '에인션트': '#b45309', '레전더리': '#ea580c', '드래곤': '#059669',
    '슈퍼에픽': '#7c3aed', '에픽': '#3b82f6', '레어': '#22c55e', '커먼': '#9ca3af',
    // 원신
    '5성': '#ea580c', '4성': '#7c3aed',
    // 블루아카이브
    'UE': '#c026d3', 'E': '#ea580c', 'SR': '#7c3aed', 'R': '#3b82f6',
  }

  function renderCharGrid() {
    const container = document.getElementById('char-grade-list')
    if (!allChars.length) {
      container.innerHTML = '<div style="text-align:center;padding:24px;color:var(--text-muted);">캐릭터가 없어요</div>'
      return
    }

    // 등급별 그룹핑
    const groups = {}
    allChars.forEach(c => {
      const g = c.tier || '기타'
      if (!groups[g]) groups[g] = []
      groups[g].push(c)
    })

    // 순서대로 렌더링
    const GRADE_ORDER = getGradeOrder()
    const orderedGrades = [...GRADE_ORDER.filter(g => groups[g]), ...Object.keys(groups).filter(g => !GRADE_ORDER.includes(g))]

    allChars.forEach(c => { charStore[c.id] = c })
    container.innerHTML = orderedGrades.map(grade => {
      const chars = groups[grade]
      const gc = gradeClass(grade)
      const dot = GRADE_DOT_COLOR[grade] || '#9ca3af'
      const cards = chars.map(c => {
        const isSelected = selectedChars.some(x => x.id === c.id)
        return `
          <div class="char-item${isSelected ? ' selected' : ''}${gc ? ' grade-border-' + gc : ''}" id="char-${c.id}" onclick="toggleChar('${c.id}')">
            ${c.imageUrl ? `<img src="${c.imageUrl}" alt="${c.nameKo}" loading="lazy">` : `<div class="char-no-img">?</div>`}
            <div class="char-name-label">${c.nameKo}</div>
            <div class="check-overlay">
              <svg viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg>
            </div>
          </div>`
      }).join('')

      return `
        <div class="char-grade-section">
          <div class="char-grade-header">
            <span class="grade-dot" style="background:${dot};"></span>
            <span>${grade}</span>
            <span style="color:var(--text-muted);font-weight:400;">${chars.length}개</span>
          </div>
          <div class="char-grid">${cards}</div>
        </div>`
    }).join('')
  }

  function toggleChar(charId) {
    const c = charStore[charId]
    if (!c) return
    const idx = selectedChars.findIndex(x => x.id === c.id)
    if (idx >= 0) {
      selectedChars.splice(idx, 1)
    } else {
      selectedChars.push(c)
    }
    // DOM 업데이트 (그리드 전체 재렌더 없이)
    const el = document.getElementById('char-' + c.id)
    if (el) el.classList.toggle('selected', selectedChars.some(x => x.id === c.id))
    renderSelectedChars()
  }

  function renderSelectedChars() {
    const el = document.getElementById('selected-chars')
    const placeholder = document.getElementById('selected-placeholder')

    if (selectedChars.length === 0) {
      el.innerHTML = '<span style="color:var(--text-muted);font-size:13px;" id="selected-placeholder">캐릭터를 선택하면 여기 표시돼요</span>'
      return
    }

    el.innerHTML = selectedChars.map(c => `
      <span class="selected-char-tag">
        ${c.imageUrl ? `<img src="${c.imageUrl}" alt="${c.nameKo}">` : ''}
        ${c.nameKo}
        <button onclick="event.stopPropagation();toggleChar('${c.id}')">×</button>
      </span>
    `).join('')
  }

  function goStep(n) {
    if (n === 2) {
      if (!selectedGameId) { alert('게임을 선택해주세요'); return }
      const serverVal = document.getElementById('server-select').value
      if (!serverVal) { alert('서버를 선택해주세요'); return }
      selectedServerId = serverVal
      loadChars()
    }
    if (n === 3) {
      renderSummary()
    }
    document.querySelectorAll('.step-panel').forEach((p, i) => {
      p.classList.toggle('active', i + 1 === n)
    })
    document.querySelectorAll('.step').forEach((s, i) => {
      s.classList.remove('active', 'done')
      if (i + 1 < n) s.classList.add('done')
      else if (i + 1 === n) s.classList.add('active')
    })
  }

  function renderSummary() {
    const selectedCard = document.querySelector('.game-select-card.selected .game-name')
    const gameText = selectedCard?.textContent ?? ''
    const serverSel = document.getElementById('server-select')
    const serverText = serverSel.options[serverSel.selectedIndex]?.text ?? ''

    const charsHtml = selectedChars.length > 0
      ? `<div class="summary-chars">${selectedChars.map(c => `
            <div class="summary-char-card">
              ${c.imageUrl ? `<img src="${c.imageUrl}" alt="${c.nameKo}">` : ''}
              <span>${c.nameKo}</span>
            </div>
          `).join('')}</div>`
      : '<strong style="color:var(--text-muted);">선택 안 함</strong>'

    document.getElementById('summary-box').innerHTML = `
      <div class="summary-row"><span>게임</span><strong>${gameText}</strong></div>
      <div class="summary-row"><span>서버</span><strong>${serverText}</strong></div>
      <div class="summary-row"><span>캐릭터</span>${charsHtml}</div>
    `
  }

  function handlePriceInput(input) {
    const raw = input.value.replace(/[^0-9]/g, '')
    input.value = raw ? Number(raw).toLocaleString('ko-KR') : ''
  }

  async function submitListing() {
    const price = Number(document.getElementById('price-input').value.replace(/,/g, ''))
    const contact = document.getElementById('contact-input').value.trim()
    if (!selectedServerId) { alert('서버를 선택해주세요'); goStep(1); return }
    if (!price || price <= 0) { alert('판매가격을 입력해주세요'); return }
    if (!contact) { alert('카카오 오픈채팅 링크를 입력해주세요'); return }

    const btn = document.getElementById('submit-btn')
    btn.disabled = true; btn.textContent = '등록 중...'

    try {
      const authUser = await requireAuth()
      if (!authUser) return

      const desc = document.getElementById('desc-input').value || null
      const updatedAt = new Date().toISOString()

      if (editListingId) {
        // 수정 모드
        const { error } = await db.from('Listing').update({
          gameId: selectedGameId,
          serverId: selectedServerId,
          price,
          description: desc,
          kakaoOpenChatUrl: contact,
          updatedAt,
        }).eq('id', editListingId)
        if (error) throw error

        // 캐릭터 재등록
        await db.from('ListingCharacter').delete().eq('listingId', editListingId)
        if (selectedChars.length > 0) {
          await db.from('ListingCharacter').insert(
            selectedChars.map(c => ({ listingId: editListingId, characterId: c.id }))
          )
        }
        alert('판매글이 수정됐어요!')
        window.location.href = '/listing/?id=' + editListingId
      } else {
        // 신규 등록
        const listingId = 'c' + Date.now().toString(36) + Math.random().toString(36).slice(2, 10)
        const { data: listing, error } = await db.from('Listing').insert({
          id: listingId,
          userId: authUser.id,
          gameId: selectedGameId,
          serverId: selectedServerId,
          price,
          description: desc,
          kakaoOpenChatUrl: contact,
          status: 'active',
          viewCount: 0,
          createdAt: updatedAt,
          updatedAt,
        }).select().single()
        if (error) throw error

        if (selectedChars.length > 0) {
          await db.from('ListingCharacter').insert(
            selectedChars.map(c => ({ listingId: listing.id, characterId: c.id }))
          )
        }
        alert('판매글이 등록됐어요!')
        window.location.href = '/'
      }
    } catch (e) {
      console.error(e)
      alert('에러: ' + (e?.message ?? JSON.stringify(e)))
      btn.disabled = false; btn.textContent = '판매글 등록'
    }
  }

  init()
</script>
<div id="footer"></div>
</body>
</html>
