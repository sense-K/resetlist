<body>
<div id="navbar"></div>

<div class="price-index-header">
  <h1>모바일 게임 리세계 계정 시세</h1>
  <p>커뮤니티 매물 기준 가격대 · 주기적 업데이트</p>
</div>

<div class="price-index-grid" id="price-index-grid">
  <div class="loading">불러오는 중...</div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="/js/config.js"></script>
<script>
  document.getElementById('navbar').innerHTML = renderNavbar()
  loadAndRenderGameUI(null)

  // 시세 페이지가 존재하는 게임 슬러그 목록
  const PRICE_PAGE_SLUGS = ['epicseven', 'genshin', 'cookie-run', 'nikke', 'bluearchive', 'zzz', 'sevenknightsre', 'leehwan', 'trickcal', 'limbus', 'stardive']

  // DB slug → price URL path 매핑 (slug != URL 경로인 경우)
  const PRICE_PATH_MAP = { 'cookie-run': 'cookierunkingdom', 'epicseven': 'epic7' }

  async function loadPriceIndex() {
    const grid = document.getElementById('price-index-grid')

    // 게임 목록 + 각 게임의 시세 최소/최대 가져오기
    const [{ data: games }, { data: priceRows }] = await Promise.all([
      db.from('Game').select('id, nameKo, slug, emoji, imageUrl').eq('isActive', true).order('sortOrder', { nullsFirst: false }),
      db.from('price_data').select('game_slug, price_min, price_max')
    ])

    if (!games) { grid.innerHTML = '<div style="color:#aaa;padding:20px;">불러오기 실패</div>'; return }

    // 게임별 시세 범위 계산
    const priceMap = {}
    if (priceRows) {
      priceRows.forEach(r => {
        if (!priceMap[r.game_slug]) priceMap[r.game_slug] = { min: r.price_min, max: r.price_max }
        else {
          priceMap[r.game_slug].min = Math.min(priceMap[r.game_slug].min, r.price_min)
          priceMap[r.game_slug].max = Math.max(priceMap[r.game_slug].max, r.price_max)
        }
      })
    }

    const cards = games.map(g => {
      const hasPricePage = PRICE_PAGE_SLUGS.includes(g.slug)
      const priceInfo = priceMap[g.slug]
      const priceText = priceInfo
        ? `${priceInfo.min.toLocaleString()}원 ~ ${priceInfo.max.toLocaleString()}원`
        : '시세 데이터 준비 중'

      const pricePathSlug = PRICE_PATH_MAP[g.slug] || g.slug
      const href = hasPricePage ? `/trade/price/${pricePathSlug}/` : null
      const tag = hasPricePage ? `<span class="price-index-card-badge">시세 보기 →</span>` : `<span class="price-index-card-badge" style="color:#aaa;background:#f3f4f6;">준비 중</span>`
      const wrapOpen = hasPricePage ? `<a class="price-index-card" href="${href}">` : `<div class="price-index-card" style="opacity:0.6;cursor:default;">`
      const wrapClose = hasPricePage ? `</a>` : `</div>`

      return `${wrapOpen}
        <div class="price-index-card-top">
          ${g.imageUrl ? `<img class="price-index-card-img" src="${g.imageUrl}" alt="${g.nameKo}">` : `<div class="price-index-card-img" style="display:flex;align-items:center;justify-content:center;font-size:24px;">${g.emoji}</div>`}
          <div class="price-index-card-name">${g.nameKo}</div>
        </div>
        <div class="price-index-card-range">${priceText}</div>
        ${tag}
      ${wrapClose}`
    }).join('')

    grid.innerHTML = cards
  }

  loadPriceIndex()
</script>
