<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <link rel="icon" type="image/svg+xml" href="/favicon.svg">
  <link rel="shortcut icon" href="/favicon.svg">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>리세계 거래소 | 플레이센스</title>
  <meta name="description" content="원신, 블루아카이브, 니케, 에픽세븐 등 인기 모바일 게임 리세계 판매계정을 한눈에 확인하세요. 수수료 없는 직거래 플랫폼.">
  <meta name="keywords" content="리세계 직거래, 리세계 판매, 리세계 계정거래, 판매계정, 플레이센스">
  <link rel="canonical" href="https://resetlist.kr/trade/">
  <meta property="og:type" content="website">
  <meta property="og:url" content="https://resetlist.kr/trade/">
  <meta property="og:title" content="리세계 거래소 | 플레이센스">
  <meta property="og:description" content="원신, 블루아카이브, 니케, 에픽세븐 등 인기 모바일 게임 리세계 판매계정. 수수료 없는 직거래.">
  <meta property="og:site_name" content="플레이센스">
  <link rel="stylesheet" href="/css/style.css">
  <style>
    .trade-wrap {
      max-width: 1300px;
      margin: 0 auto;
      padding: 36px 60px 80px;
      min-height: calc(100vh - 200px);
      box-sizing: border-box;
    }
    @media (max-width: 1024px) { .trade-wrap { padding: 32px 32px 80px; } }
    @media (max-width: 768px)  { .trade-wrap { padding: 24px 16px 60px; } }

    .trade-page-header { margin-bottom: 20px; }
    .trade-page-title { font-size: 22px; font-weight: 800; color: #1e293b; }
    .trade-page-sub { font-size: 13px; color: #94a3b8; margin-top: 3px; }

    /* 게임 그리드 */
    .trade-game-grid {
      display: grid;
      grid-template-columns: repeat(6, 1fr);
      gap: 8px;
      margin-bottom: 24px;
    }
    @media (max-width: 900px) { .trade-game-grid { grid-template-columns: repeat(5, 1fr); } }
    @media (max-width: 640px) { .trade-game-grid { grid-template-columns: repeat(4, 1fr); } }
    @media (max-width: 440px) { .trade-game-grid { grid-template-columns: repeat(3, 1fr); } }

    .trade-game-card {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 6px;
      padding: 10px 6px;
      border-radius: 12px;
      border: 1.5px solid #e5e7eb;
      background: #fff;
      color: #475569;
      text-decoration: none;
      font-size: 12px;
      font-weight: 600;
      text-align: center;
      transition: border-color 0.15s, color 0.15s, box-shadow 0.15s;
      cursor: pointer;
    }
    .trade-game-card:hover { border-color: #6c47ff; color: #6c47ff; box-shadow: 0 2px 8px rgba(108,71,255,0.10); }
    .trade-game-card.active { border-color: #6c47ff; color: #6c47ff; background: #f5f3ff; box-shadow: 0 2px 8px rgba(108,71,255,0.13); }
    .trade-game-card img { width: 36px; height: 36px; border-radius: 8px; object-fit: cover; }
    .trade-game-card .card-emoji { font-size: 28px; line-height: 1; }
    .trade-game-card span { line-height: 1.3; word-break: keep-all; }

    /* 판매하기 CTA */
    .sell-cta {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 14px 20px;
      border-radius: 14px;
      background: linear-gradient(135deg, #6c47ff 0%, #9b72ff 100%);
      color: #fff;
      text-decoration: none;
      margin-bottom: 20px;
      transition: opacity 0.15s, transform 0.15s;
    }
    .sell-cta:hover { opacity: 0.93; transform: translateY(-1px); }
    .sell-cta-text { display: flex; flex-direction: column; gap: 2px; }
    .sell-cta-text strong { font-size: 15px; font-weight: 800; }
    .sell-cta-text span { font-size: 12px; opacity: 0.85; }
    .sell-cta-arrow { font-size: 14px; font-weight: 700; white-space: nowrap; padding-left: 12px; }

    /* 정렬 바 */
    .trade-sort-bar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 16px;
    }
    .trade-sort { display: flex; align-items: center; gap: 6px; }
  </style>
</head>
<body>
<div id="navbar"></div>

<div class="trade-wrap">
  <div class="trade-page-header">
    <div class="trade-page-title">거래소</div>
    <div class="trade-page-sub">수수료 없는 리세계 직거래 플랫폼</div>
  </div>

  <!-- 판매하기 CTA -->
  <a href="/trade/register/" class="sell-cta">
    <div class="sell-cta-text">
      <strong>내 계정 팔기</strong>
      <span>리세계 판매계정을 무료로 등록하세요</span>
    </div>
    <div class="sell-cta-arrow">등록하기 →</div>
  </a>

  <!-- 게임 그리드 -->
  <div class="trade-game-grid" id="trade-tabs">
    <a href="/trade/" class="trade-game-card active">
      <span class="card-emoji">🎮</span>
      <span>전체</span>
    </a>
  </div>

  <!-- 정렬 -->
  <div class="trade-sort-bar">
    <div class="trade-sort">
      <button class="sort-btn active" id="sort-latest" onclick="setSort('latest')">최신순</button>
      <span class="sort-divider">|</span>
      <button class="sort-btn" id="sort-price" onclick="setSort('price')">가격순</button>
    </div>
  </div>

  <div id="listings-container"><div class="loading">불러오는 중...</div></div>
  <a href="#" class="btn-more" id="more-btn" style="display:none;">계정 더보기</a>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="/js/config.js"></script>
<script src="/js/listings.js"></script>
<script>
  document.getElementById('navbar').innerHTML = renderNavbar()
  loadAndRenderGameUI(null)

  async function loadGameTabs() {
    const { data: games } = await db.from('Game')
      .select('id, nameKo, slug, emoji, imageUrl')
      .eq('isActive', true)
      .order('sortOrder', { nullsFirst: false })
      .order('nameKo')
    if (!games) return
    const tabsEl = document.getElementById('trade-tabs')
    games.forEach(g => {
      const a = document.createElement('a')
      a.href = gameSlugToPath(g.slug)
      a.className = 'trade-game-card'
      const icon = g.imageUrl
        ? `<img src="${g.imageUrl}" alt="${g.nameKo}" width="36" height="36">`
        : `<span class="card-emoji">${g.emoji || '🎮'}</span>`
      a.innerHTML = icon + `<span>${g.nameKo}</span>`
      tabsEl.appendChild(a)
    })
  }

  let currentSort = 'latest'
  let currentPage = 1

  function setSort(sort) {
    currentSort = sort
    currentPage = 1
    document.getElementById('sort-latest').classList.toggle('active', sort === 'latest')
    document.getElementById('sort-price').classList.toggle('active', sort === 'price')
    loadListings({ container: 'listings-container', limit: 12, sort, moreBtn: 'more-btn' })
  }

  document.getElementById('more-btn').addEventListener('click', e => {
    e.preventDefault()
    currentPage++
    loadListings({ container: 'listings-container', limit: 12, sort: currentSort, page: currentPage, append: true, moreBtn: 'more-btn' })
  })

  loadGameTabs()
  loadListings({ container: 'listings-container', limit: 12, moreBtn: 'more-btn' })
</script>
<div id="footer"></div>
</body>
</html>
