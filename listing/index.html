<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>판매계정 상세 | 리세 리스트</title>
  <link rel="stylesheet" href="/css/style.css">
  <style>
    .detail-wrap {
      max-width: 720px;
      margin: 0 auto;
      padding: 0 20px 60px;
    }
    .detail-banner {
      position: relative;
      height: 200px;
      background: #222;
      border-radius: 0 0 20px 20px;
      overflow: hidden;
      margin-bottom: 24px;
    }
    .detail-banner img { width: 100%; height: 100%; object-fit: cover; object-position: center top; }
    .detail-banner-overlay { position: absolute; inset: 0; background: linear-gradient(to bottom, rgba(0,0,0,0.1) 0%, rgba(0,0,0,0.6) 100%); }
    .detail-banner-info { position: absolute; bottom: 16px; left: 20px; display: flex; align-items: center; gap: 10px; }
    .detail-game-icon { width: 36px; height: 36px; border-radius: 8px; object-fit: cover; }
    .detail-game-name { color: #fff; font-size: 15px; font-weight: 700; white-space: nowrap; text-shadow: 0 1px 6px rgba(0,0,0,0.7); }
    .detail-server-badge { background: rgba(0,0,0,0.45); color: #fff; font-size: 12px; font-weight: 600; padding: 3px 10px; border-radius: 999px; backdrop-filter: blur(4px); white-space: nowrap; }

    .status-badge { display: inline-flex; align-items: center; gap: 5px; font-size: 12px; font-weight: 700; padding: 4px 12px; border-radius: 999px; margin-bottom: 12px; }
    .status-badge.trading { background: #fef3c7; color: #d97706; }
    .status-badge.sold { background: #f3f4f6; color: #888; }
    .status-badge.active { background: #dcfce7; color: #16a34a; }
    .status-badge.seller_confirmed { background: #e0f2fe; color: #0369a1; }

    .detail-price-block { display: flex; align-items: baseline; gap: 10px; margin-bottom: 20px; }
    .detail-price { font-size: 32px; font-weight: 900; color: #111; }

    .detail-section { margin-bottom: 24px; }
    .detail-section-title { font-size: 13px; font-weight: 700; color: #888; text-transform: uppercase; letter-spacing: 0.05em; margin-bottom: 10px; }

    .detail-chars-grid { display: grid; grid-template-columns: repeat(6, 1fr); gap: 8px; }
    .detail-char-card { position: relative; border-radius: 10px; overflow: hidden; aspect-ratio: 1/1; background: #f3f4f6; border: 1.5px solid var(--border); }
    .detail-char-card img { width: 100%; height: 100%; object-fit: cover; display: block; }
    .detail-char-card .char-name-label { position: absolute; bottom: 0; left: 0; right: 0; background: linear-gradient(to top, rgba(0,0,0,0.8) 0%, transparent 100%); color: #fff; font-size: 9px; font-weight: 600; padding: 12px 3px 4px; text-align: center; }
    .detail-char-no-img { width: 100%; height: 100%; display: flex; align-items: center; justify-content: center; font-size: 24px; color: #ccc; }

    .detail-desc { font-size: 14px; line-height: 1.7; color: #444; background: #f8f8f8; border-radius: 12px; padding: 16px; white-space: pre-wrap; }

    .detail-seller-row { display: flex; align-items: center; justify-content: space-between; padding: 14px 0; border-top: 1px solid var(--border); border-bottom: 1px solid var(--border); }
    .detail-seller-info { display: flex; align-items: center; gap: 8px; }
    .detail-seller-avatar { width: 36px; height: 36px; border-radius: 50%; background: #e5e7eb; display: flex; align-items: center; justify-content: center; font-size: 16px; }
    .detail-seller-name { font-size: 14px; font-weight: 700; }
    .detail-seller-meta { font-size: 12px; color: #888; }
    .seller-stats { display: flex; gap: 10px; font-size: 12px; color: #888; }
    .seller-stat { display: flex; align-items: center; gap: 3px; }

    /* 신뢰 배지 */
    .trust-badge { display: inline-flex; align-items: center; gap: 4px; font-size: 11px; font-weight: 700; padding: 2px 8px; border-radius: 999px; margin-left: 6px; }
    .trust-badge.lv1 { background: #f3f4f6; color: #888; }
    .trust-badge.lv2 { background: #d1fae5; color: #065f46; }
    .trust-badge.lv3 { background: #dbeafe; color: #1e40af; }
    .trust-badge.lv4 { background: #fef3c7; color: #92400e; }

    /* 구매 버튼 */
    .buy-box { margin-top: 24px; border: 1.5px solid var(--border); border-radius: 16px; padding: 20px; }
    .buy-box-title { font-size: 15px; font-weight: 800; margin-bottom: 4px; }
    .buy-box-desc { font-size: 12px; color: #888; margin-bottom: 16px; }
    .buy-btn { width: 100%; padding: 16px; background: #111; color: #fff; border: none; border-radius: 12px; font-size: 16px; font-weight: 800; cursor: pointer; transition: opacity 0.15s; }
    .buy-btn:hover { opacity: 0.85; }

    /* 연락처 공개 */
    .contact-box { background: #111; border-radius: 14px; padding: 20px; margin-top: 16px; text-align: center; }
    .contact-box .contact-label { color: rgba(255,255,255,0.6); font-size: 12px; margin-bottom: 10px; }
    .contact-info-text { color: #fff; font-size: 16px; font-weight: 700; margin-bottom: 14px; word-break: break-all; }
    .contact-btn-row { display: flex; gap: 8px; justify-content: center; }
    .contact-copy-btn { background: rgba(255,255,255,0.15); color: #fff; border: none; border-radius: 8px; padding: 10px 20px; font-size: 14px; font-weight: 600; cursor: pointer; transition: background 0.15s; }
    .contact-copy-btn:hover { background: rgba(255,255,255,0.25); }
    .contact-open-btn { background: #fee500; color: #111; border: none; border-radius: 8px; padding: 10px 20px; font-size: 14px; font-weight: 700; cursor: pointer; text-decoration: none; display: inline-block; }

    /* 거래 완료 확인 박스 */
    .confirm-box { background: #f0fdf4; border: 1.5px solid #bbf7d0; border-radius: 14px; padding: 20px; margin-top: 16px; text-align: center; }
    .confirm-box p { font-size: 14px; color: #166534; margin-bottom: 14px; line-height: 1.6; }
    .confirm-btn { background: #16a34a; color: #fff; border: none; border-radius: 10px; padding: 12px 28px; font-size: 14px; font-weight: 700; cursor: pointer; transition: opacity 0.15s; }
    .confirm-btn:hover { opacity: 0.85; }

    /* 리뷰 유도 */
    .review-prompt-box { background: #fff7ed; border: 1.5px solid #fed7aa; border-radius: 14px; padding: 20px; margin-top: 16px; text-align: center; }
    .review-prompt-box p { font-size: 14px; color: #92400e; margin-bottom: 12px; line-height: 1.6; }
    .review-write-btn { background: #f97316; color: #fff; border: none; border-radius: 8px; padding: 11px 28px; font-size: 14px; font-weight: 700; cursor: pointer; }

    .cancel-trade-btn { width: 100%; margin-top: 10px; padding: 12px; background: none; border: 1.5px solid var(--border); border-radius: 10px; color: #aaa; font-size: 13px; font-weight: 600; cursor: pointer; transition: all 0.15s; }
    .cancel-trade-btn:hover { border-color: #ef4444; color: #ef4444; }

    .status-info-box { background: #f8f8f8; border-radius: 14px; padding: 20px; margin-top: 16px; text-align: center; color: #888; font-size: 14px; }

    .detail-meta { display: flex; gap: 16px; font-size: 12px; color: #aaa; margin-top: 12px; }
    .loading-full { display: flex; align-items: center; justify-content: center; height: 300px; color: #aaa; font-size: 14px; }

    /* 공유 버튼 */
    .share-row { display: flex; align-items: center; justify-content: space-between; margin-bottom: 12px; }
    .share-btn {
      display: inline-flex; align-items: center; gap: 6px;
      font-size: 13px; font-weight: 700; color: #fff;
      background: #111; border: none; border-radius: 999px;
      padding: 8px 16px; cursor: pointer; transition: all 0.15s;
    }
    .share-btn:hover { background: #333; }
    .share-toast {
      position: fixed; bottom: 32px; left: 50%; transform: translateX(-50%);
      background: #111; color: #fff; font-size: 13px; font-weight: 600;
      padding: 10px 20px; border-radius: 999px;
      opacity: 0; pointer-events: none; transition: opacity 0.2s;
      z-index: 9999; white-space: nowrap;
    }
    .share-toast.show { opacity: 1; }

    @media (max-width: 600px) {
      .detail-chars-grid { grid-template-columns: repeat(5, 1fr); }
      .detail-price { font-size: 26px; }
    }
  </style>
</head>
<body>
<div id="navbar"></div>

<div id="detail-content">
  <div class="loading-full">불러오는 중...</div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="/js/config.js"></script>
<script>
  document.getElementById('navbar').innerHTML = renderNavbar()

  const listingId = new URLSearchParams(location.search).get('id')
  let currentListing = null
  let currentUser = null

  if (!listingId) {
    document.getElementById('detail-content').innerHTML = '<div class="loading-full">잘못된 접근이에요.</div>'
  } else {
    loadDetail()
  }

  async function loadDetail() {
    const { data: { session } } = await db.auth.getSession()
    currentUser = session?.user ?? null

    const { data: listing, error } = await db
      .from('Listing')
      .select(`
        id, price, description, kakaoOpenChatUrl, createdAt, viewCount, status, userId,
        game:Game(nameKo, slug, emoji, imageUrl, artImageUrl),
        server:Server(nameKo),
        user:User(nickname, tradeCount, avgRating),
        characters:ListingCharacter(character:Character(nameKo, tier, imageUrl))
      `)
      .eq('id', listingId)
      .single()

    if (error || !listing) {
      document.getElementById('detail-content').innerHTML = '<div class="loading-full">판매글을 찾을 수 없어요.</div>'
      return
    }

    currentListing = listing
    db.from('Listing').update({ viewCount: (listing.viewCount || 0) + 1 }).eq('id', listingId)

    let myTrade = null
    if (currentUser) {
      const { data: trade } = await db
        .from('Trade')
        .select('id, status')
        .eq('listingId', listingId)
        .eq('buyerId', currentUser.id)
        .not('status', 'eq', 'cancelled')
        .order('createdAt', { ascending: false })
        .limit(1)
        .maybeSingle()
      myTrade = trade
    }

    // 다른 사람이 거래 중인지 확인 (RLS 우회용)
    const { data: anyActiveTrade } = await db
      .from('Trade')
      .select('id, buyerId')
      .eq('listingId', listingId)
      .in('status', ['active', 'seller_confirmed'])
      .maybeSingle()

    render(listing, myTrade, anyActiveTrade)
  }

  async function render(l, myTrade, anyActiveTrade) {
    const gameArtUrl = l.game?.artImageUrl ?? ''
    const gameImageUrl = l.game?.imageUrl ?? ''
    const gameName = l.game?.nameKo ?? ''
    const gameEmoji = l.game?.emoji ?? ''
    const serverName = l.server?.nameKo ?? ''
    const nickname = l.user?.nickname ?? '익명'
    const tradeCount = l.user?.tradeCount ?? 0
    const avgRating = l.user?.avgRating ? Number(l.user.avgRating).toFixed(1) : null
    const chars = (l.characters ?? []).map(lc => lc.character).filter(Boolean)
    const isMine = currentUser && currentUser.id === l.userId

    document.title = `${gameName} 리세계 판매계정 | 리세 리스트`

    const charsHtml = chars.length > 0
      ? chars.map(c => {
          const gc = gradeClass(c.tier)
          return `
            <div class="detail-char-card${gc ? ' grade-border-' + gc : ''}">
              ${c.imageUrl ? `<img src="${c.imageUrl}" alt="${c.nameKo}" loading="lazy">` : '<div class="detail-char-no-img">?</div>'}
              ${gc ? `<span class="grade-tag grade-${gc}" style="font-size:8px;padding:1px 4px;">${gradeShort(c.tier)}</span>` : ''}
              <div class="char-name-label">${c.nameKo}</div>
            </div>`
        }).join('')
      : '<span style="color:#aaa;font-size:13px;">선택된 캐릭터 없음</span>'

    // trading 상태인데 실제 활성 Trade 없으면 active로 보정
    const effectiveStatus = (l.status === 'trading' && !anyActiveTrade) ? 'active' : l.status

    const statusMap = {
      active: ['판매중', 'active'],
      trading: ['거래중', 'trading'],
      seller_confirmed: ['전달 완료 대기중', 'seller_confirmed'],
      sold: ['판매완료', 'sold']
    }
    const [statusText, statusClass] = statusMap[effectiveStatus] ?? ['판매중', 'active']

    // 신뢰 배지
    const trustBadge = trustBadgeHtml(tradeCount)
    const ratingHtml = avgRating ? `<span class="seller-stat">⭐ ${avgRating}</span>` : ''

    const actionHtml = await buildActionBox(l, myTrade, isMine, anyActiveTrade)

    document.getElementById('detail-content').innerHTML = `
      <div class="detail-banner">
        ${gameArtUrl ? `<img src="${gameArtUrl}" alt="${gameName}">` : ''}
        <div class="detail-banner-overlay"></div>
        <div class="detail-banner-info">
          ${gameImageUrl ? `<img class="detail-game-icon" src="${gameImageUrl}" alt="${gameName}">` : `<span style="font-size:24px;">${gameEmoji}</span>`}
          <span class="detail-game-name">${gameName}</span>
          ${serverName ? `<span class="detail-server-badge">${serverName}</span>` : ''}
        </div>
      </div>

      <div class="detail-wrap">
        <div class="share-row">
          <span class="status-badge ${statusClass}" style="margin-bottom:0;">${statusText}</span>
          <button class="share-btn" onclick="shareListing()">🔗 공유하기</button>
        </div>

        <div class="detail-price-block">
          <span class="detail-price">${formatPrice(l.price)}</span>
        </div>

        <div class="detail-section">
          <div class="detail-section-title">보유 캐릭터 (${chars.length}개)</div>
          <div class="detail-chars-grid">${charsHtml}</div>
        </div>

        ${l.description ? `
        <div class="detail-section">
          <div class="detail-section-title">계정 설명</div>
          <div class="detail-desc">${l.description}</div>
        </div>` : ''}

        <div class="detail-seller-row">
          <div class="detail-seller-info">
            <div class="detail-seller-avatar">👤</div>
            <div>
              <span>
                <a class="detail-seller-name" href="/user/?id=${l.userId}" style="text-decoration:none;color:inherit;">${nickname}</a>
                ${trustBadge}
              </span>
              <div class="detail-seller-meta">${timeAgo(l.createdAt)} 등록</div>
            </div>
          </div>
          <div class="seller-stats">
            ${ratingHtml}
            <span class="seller-stat">🤝 ${tradeCount}거래</span>
            <span class="seller-stat">👁 ${l.viewCount || 0}</span>
          </div>
        </div>

        ${actionHtml}

        <div id="seller-reviews" style="margin-top:32px;"></div>
      </div>
    `

    // 판매자 리뷰 로드
    loadSellerReviews(l.userId)
  }

  function trustBadgeHtml(tradeCount) {
    if (tradeCount >= 30) return '<span class="trust-badge lv4">🥇 인증 판매자</span>'
    if (tradeCount >= 10) return '<span class="trust-badge lv3">🥈 신뢰 판매자</span>'
    if (tradeCount >= 3)  return '<span class="trust-badge lv2">🥉 거래 경험</span>'
    return '<span class="trust-badge lv1">신규</span>'
  }

  async function buildActionBox(l, myTrade, isMine, anyActiveTrade) {
    // 내 글
    if (isMine) {
      if (l.status === 'sold') {
        return `<div class="status-info-box">판매 완료된 계정이에요.</div>`
      }
      // seller_confirmed: 진행중 거래 없거나 이미 후기가 작성됐으면 → 수령확인 완료된 것 → sold로 복구
      if (l.status === 'seller_confirmed') {
        const { data: existingReview } = await db.from('Review').select('id').eq('listingId', listingId).maybeSingle()
        if (!anyActiveTrade || existingReview) {
          if (existingReview && anyActiveTrade) {
            // Trade 업데이트가 RLS로 막혔던 케이스 → 판매자 권한으로 완료 처리
            db.from('Trade').update({ status: 'completed' }).eq('listingId', listingId).eq('status', 'seller_confirmed')
          }
          db.from('Listing').update({ status: 'sold' }).eq('id', listingId)
          return `<div class="status-info-box">판매 완료된 계정이에요.</div>`
        }
        return `<div class="status-info-box" style="background:#e0f2fe;color:#0369a1;">구매자의 수령 확인을 기다리고 있어요.</div>`
      }
      // trading 상태이지만 실제 진행 거래 없으면 → 거래 취소 후 Listing 상태만 미반영된 케이스
      if (l.status === 'trading' && !anyActiveTrade) {
        db.from('Listing').update({ status: 'active' }).eq('id', listingId)
        return `<div class="status-info-box">내가 등록한 판매글이에요.</div>`
      }
      if (l.status === 'trading') {
        return `
          <div class="status-info-box">
            거래 진행 중이에요. 구매자와 연락하세요.<br>
            <button class="cancel-trade-btn" style="margin-top:12px;" onclick="cancelTradeAsSeller()">거래 취소</button>
            <button class="cancel-trade-btn" style="margin-top:8px;border-color:#10b981;color:#10b981;" onclick="sellerConfirm()">계정 전달 완료</button>
          </div>`
      }
      return `<div class="status-info-box">내가 등록한 판매글이에요.</div>`
    }

    // 거래 완료 후 리뷰 유도
    if (currentUser && l.status === 'sold') {
      const { data: completedTrade } = await db
        .from('Trade').select('id')
        .eq('listingId', listingId).eq('buyerId', currentUser.id).eq('status', 'completed')
        .maybeSingle()
      if (completedTrade) {
        const { data: existingReview } = await db.from('Review').select('id').eq('listingId', listingId).eq('reviewerId', currentUser.id).maybeSingle()
        if (!existingReview) {
          return `
            <div class="review-prompt-box" style="margin-top:16px;">
              <p>거래가 완료됐어요!<br>후기를 남겨 다른 구매자에게 도움을 주세요 😊</p>
              <button class="review-write-btn" onclick="location.href='/review/?tradeId=${completedTrade.id}'">후기 작성하기</button>
            </div>`
        }
      }
    }

    // 거래 완료된 경우 → 취소 불가
    if (myTrade && myTrade.status === 'completed') {
      const { data: existingReview } = await db.from('Review').select('id')
        .eq('listingId', listingId).eq('reviewerId', currentUser.id).maybeSingle()
      if (existingReview) {
        return `<div class="status-info-box">거래가 완료됐어요. 후기도 남겨주셨네요 😊</div>`
      }
      return `
        <div class="review-prompt-box" style="margin-top:16px;">
          <p>거래가 완료됐어요!<br>후기를 남겨 다른 구매자에게 도움을 주세요 😊</p>
          <button class="review-write-btn" onclick="location.href='/review/?tradeId=${myTrade.id}'">후기 작성하기</button>
        </div>`
    }

    // 내가 신청한 거래 진행중
    if (myTrade && myTrade.status === 'active') {
      const chatUrl = l.kakaoOpenChatUrl ?? ''
      return `
        <div class="contact-box">
          <div class="contact-label">판매자의 오픈채팅방에서 연락하세요</div>
          <div class="contact-info-text">${chatUrl || '연락처 없음'}</div>
          <div class="contact-btn-row">
            ${chatUrl ? `<a class="contact-open-btn" href="${chatUrl}" target="_blank" rel="noopener">카카오 오픈채팅 열기</a>` : ''}
            <button class="contact-copy-btn" onclick="copyContact('${chatUrl}')">링크 복사</button>
          </div>
        </div>
        <button class="cancel-trade-btn" onclick="cancelTrade('${myTrade.id}')">거래 취소</button>`
    }

    // 판매자가 "계정 전달 완료" 눌렀고 내가 구매자인 경우
    if (myTrade && myTrade.status === 'seller_confirmed') {
      return `
        <div class="confirm-box">
          <p>판매자가 계정을 전달했어요.<br>계정을 확인하고 후기를 작성하면 거래가 완료돼요 😊</p>
          <a class="confirm-btn" href="/review/?tradeId=${myTrade.id}" style="display:inline-block;text-decoration:none;">후기 작성 및 수령 확인하기</a>
        </div>
        <button class="cancel-trade-btn" onclick="cancelTrade('${myTrade.id}')">거래 취소</button>`
    }

    // 판매완료
    if (l.status === 'sold') {
      return `<div class="status-info-box">판매 완료된 계정이에요.</div>`
    }

    // 실제 진행중인 거래가 있으면 거래중 표시
    if (anyActiveTrade) {
      return `<div class="status-info-box">현재 다른 분과 거래 진행 중이에요.</div>`
    }

    // 구매 신청 가능: 진행중인 거래 없고 판매완료 아닐 때 (Listing.status가 'trading'으로 잘못 남아있어도 허용)
    return `
      <div class="buy-box">
        <div class="buy-box-title">구매 신청</div>
        <div class="buy-box-desc">신청 후 판매자의 오픈채팅 링크가 공개돼요</div>
        <button class="buy-btn" onclick="requestTrade()">구매 신청하기 · ${formatPrice(l.price)}</button>
      </div>`
  }

  async function requestTrade() {
    if (!currentUser) {
      window.location.href = '/auth/?next=' + encodeURIComponent(location.pathname + location.search)
      return
    }
    if (!confirm('구매 신청할까요?\n\n신청 즉시 판매자의 오픈채팅 링크가 공개돼요.')) return

    const btn = event.currentTarget
    btn.disabled = true

    try {
      const tradeId = 'c' + Date.now().toString(36) + Math.random().toString(36).slice(2, 10)
      const { error } = await db.from('Trade').insert({
        id: tradeId,
        listingId: currentListing.id,
        buyerId: currentUser.id,
        sellerId: currentListing.userId,
        type: 'normal',
        status: 'active',
        createdAt: new Date().toISOString(),
      })
      if (error) throw error
      const { error: listingError } = await db.from('Listing').update({ status: 'trading' }).eq('id', currentListing.id)
      if (listingError) console.error('Listing 상태 업데이트 실패 (RLS 정책 확인 필요):', listingError)
      location.reload()
    } catch (e) {
      console.error(e)
      alert('오류가 발생했어요: ' + e.message)
      btn.disabled = false
    }
  }

  async function sellerConfirm() {
    if (!confirm('계정을 구매자에게 전달하셨나요?\n확인을 누르면 구매자에게 수령 확인 요청이 돼요.')) return
    const { data: trade } = await db.from('Trade').select('id').eq('listingId', listingId).eq('status', 'active').maybeSingle()
    if (!trade) { alert('진행중인 거래가 없어요.'); return }
    await db.from('Trade').update({ status: 'seller_confirmed' }).eq('id', trade.id)
    await db.from('Listing').update({ status: 'seller_confirmed' }).eq('id', listingId)
    location.reload()
  }

  async function buyerConfirm(tradeId) {
    if (!confirm('계정을 정상적으로 수령하셨나요?\n확인하면 거래가 완료돼요.')) return
    try {
      const now = new Date().toISOString()

      // 동일 buyer-seller 쌍 이전 완료 거래 수 확인 (어뷰징 방지)
      const { data: prevCompleted } = await db.from('Trade')
        .select('id').eq('buyerId', currentUser.id).eq('sellerId', currentListing.userId).eq('status', 'completed')
      const isFirstTime = !prevCompleted || prevCompleted.length === 0

      await db.from('Trade').update({ status: 'completed', completedAt: now }).eq('id', tradeId)
      await db.from('Listing').update({ status: 'sold' }).eq('id', listingId)

      // 동일 쌍 첫 완료일 때만 tradeCount +1
      if (isFirstTime) {
        const { data: seller } = await db.from('User').select('tradeCount').eq('id', currentListing.userId).single()
        await db.from('User').update({ tradeCount: (seller?.tradeCount ?? 0) + 1 }).eq('id', currentListing.userId)
      }

      alert('거래가 완료됐어요!')
      location.reload()
    } catch (e) {
      console.error(e)
      alert('오류: ' + e.message)
    }
  }

  async function cancelTrade(tradeId) {
    if (!confirm('거래를 취소할까요?')) return
    await db.from('Trade').update({ status: 'cancelled' }).eq('id', tradeId)
    await db.from('Listing').update({ status: 'active' }).eq('id', listingId)
    location.reload()
  }

  async function cancelTradeAsSeller() {
    if (!confirm('거래를 취소할까요? 구매자와 확인 후 취소해주세요.')) return
    try {
      // 진행중인 거래 ID 먼저 조회
      const { data: trades, error: fetchErr } = await db
        .from('Trade')
        .select('id')
        .eq('listingId', listingId)
        .in('status', ['active', 'seller_confirmed'])
      if (fetchErr) throw fetchErr

      if (trades && trades.length > 0) {
        const { error: tradeErr } = await db
          .from('Trade')
          .update({ status: 'cancelled' })
          .in('id', trades.map(t => t.id))
        if (tradeErr) throw tradeErr
      }

      const { error: listingErr } = await db
        .from('Listing')
        .update({ status: 'active' })
        .eq('id', listingId)
      if (listingErr) throw listingErr

      location.reload()
    } catch (e) {
      console.error('거래 취소 오류:', e)
      alert('거래 취소 중 오류가 발생했어요: ' + (e?.message ?? JSON.stringify(e)))
    }
  }

  async function loadSellerReviews(sellerId) {
    const { data: reviews } = await db
      .from('Review')
      .select('rating, content, createdAt, listing:Listing(game:Game(nameKo, imageUrl, emoji))')
      .eq('sellerId', sellerId)
      .order('createdAt', { ascending: false })
      .limit(10)

    const el = document.getElementById('seller-reviews')
    if (!el) return

    if (!reviews || reviews.length === 0) {
      el.innerHTML = `
        <div style="font-size:15px;font-weight:800;margin-bottom:12px;">판매자 후기</div>
        <div style="font-size:13px;color:#aaa;padding:20px 0;">아직 받은 후기가 없어요</div>`
      return
    }

    const stars = n => '⭐'.repeat(n) + '☆'.repeat(5 - n)

    el.innerHTML = `
      <div style="font-size:15px;font-weight:800;margin-bottom:14px;">판매자 후기 <span style="color:#aaa;font-size:13px;font-weight:400;">${reviews.length}개</span></div>
      <div style="border-top:1px solid var(--border);">
        ${reviews.map(r => {
          const gImg = r.listing?.game?.imageUrl ?? ''
          const gEmoji = r.listing?.game?.emoji ?? ''
          const gName = r.listing?.game?.nameKo ?? ''
          const gameTag = gName
            ? `<span style="display:inline-flex;align-items:center;gap:4px;font-size:11px;color:#888;background:#f3f4f6;padding:2px 7px 2px 4px;border-radius:999px;">
                ${gImg ? `<img src="${gImg}" style="width:14px;height:14px;border-radius:3px;object-fit:cover;">` : gEmoji}
                ${gName}
              </span>`
            : ''
          return `
            <div style="padding:14px 0;border-bottom:1px solid var(--border);">
              <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:6px;">
                <div style="display:flex;align-items:center;gap:8px;">
                  <span style="font-size:13px;">${stars(r.rating)}</span>
                  ${gameTag}
                </div>
                <span style="font-size:11px;color:#aaa;">${timeAgo(r.createdAt)}</span>
              </div>
              <div style="font-size:13px;color:${r.content ? '#444' : '#bbb'};line-height:1.6;">${r.content || '내용 없음'}</div>
            </div>`
        }).join('')}
      </div>`
  }

  async function shareListing() {
    const url = window.location.href
    try {
      await navigator.clipboard.writeText(url)
      showToast('링크가 복사됐어요!')
    } catch (e) {
      showToast('링크: ' + url)
    }
  }

  function showToast(msg) {
    let toast = document.getElementById('share-toast')
    if (!toast) {
      toast = document.createElement('div')
      toast.id = 'share-toast'
      toast.className = 'share-toast'
      document.body.appendChild(toast)
    }
    toast.textContent = msg
    toast.classList.add('show')
    setTimeout(() => toast.classList.remove('show'), 2200)
  }

  function copyContact(url) {
    navigator.clipboard.writeText(url).then(() => {
      const btn = document.querySelector('.contact-copy-btn')
      if (btn) { btn.textContent = '복사됐어요 ✓'; setTimeout(() => { btn.textContent = '링크 복사' }, 2000) }
    })
  }
</script>
<div id="footer"></div>
</body>
</html>
